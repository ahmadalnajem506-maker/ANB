// ═══ BANK IMPORT: CSV / MT940 ═══════════════════════════════

function importBankFile(ev,cid){
  const file=ev.target.files&&ev.target.files[0];
  if(!file)return;
  const reader=new FileReader();
  reader.onload=e=>{
    const raw=e.target.result;
    let txs=[];
    let format='unknown';
    try{
      if(raw.includes(':20:')||raw.includes('\n:60')){
        txs=parseMT940(raw,cid); format='MT940';
      } else {
        const header=raw.split('\n')[0].toLowerCase();
        if(header.includes('datum') && header.includes('bedrag')){
          if(header.includes('naam/omschrijving')||header.includes('tegenrekening')){
            txs=parseINGcsv(raw,cid); format='ING CSV';
          } else if(header.includes('mededelingen')||header.includes('mutatiesoort')){
            txs=parseRabobankCsv(raw,cid); format='Rabobank CSV';
          } else {
            txs=parseGenericCsv(raw,cid); format='Generic CSV';
          }
        } else if(header.includes('transactiedatum')||header.includes('omschrijving')){
          txs=parseABNcsv(raw,cid); format='ABN AMRO CSV';
        } else if(header.includes('amount')||header.includes('description')){
          txs=parseBunqCsv(raw,cid); format='Bunq CSV';
        } else {
          txs=parseGenericCsv(raw,cid); format='Generic CSV';
        }
      }
    }catch(err){
      toast('Import error: '+err.message,'ti-alert-circle');
      ev.target.value=''; return;
    }
    if(!txs.length){
      toast('No transactions found in file','ti-alert-circle');
      ev.target.value=''; return;
    }
    // Deduplicate: skip txs with same date+amount+desc already in bankTx
    const existing=new Set(S.bankTx.filter(tx=>tx.cid===cid).map(tx=>tx.date+'|'+tx.amount+'|'+tx.desc.slice(0,20)));
    const newTxs=txs.filter(tx=>!existing.has(tx.date+'|'+tx.amount+'|'+tx.desc.slice(0,20)));
    if(!newTxs.length){
      toast('All transactions already imported (duplicates skipped)','ti-alert-circle');
      ev.target.value=''; return;
    }
    S.bankTx.push(...newTxs);
    sv();renderContent();
    toast(`✓ ${format}: ${newTxs.length} imported, ${txs.length-newTxs.length} duplicates skipped`,'ti-check');
    ev.target.value='';
  };
  reader.readAsText(file,'UTF-8');
}

// ── ING CSV ──────────────────────────────────────────────────
// Header: "Datum";"Naam / Omschrijving";"Rekening";"Tegenrekening";"Code";"Af Bij";"Bedrag (EUR)";"Mutatiesoort";"Mededelingen"
function parseINGcsv(raw,cid){
  const lines=raw.split('\n').map(l=>l.trim()).filter(Boolean);
  const txs=[];
  for(let i=1;i<lines.length;i++){
    const cols=splitCSV(lines[i]);
    if(cols.length<7)continue;
    const dateStr=cols[0].replace(/"/g,'').trim(); // DD-MM-YYYY
    const desc=((cols[1]||'')+(cols[8]?'; '+(cols[8]):''))
      .replace(/"/g,'').trim().slice(0,100);
    const afbij=(cols[5]||'').replace(/"/g,'').trim(); // Af / Bij
    const amtStr=(cols[6]||'').replace(/"/g,'').replace(',','.').trim();
    const amt=parseFloat(amtStr)||(0);
    const amount=afbij.toLowerCase()==='af'?-Math.abs(amt):Math.abs(amt);
    const date=parseDateNL(dateStr);
    if(date&&!isNaN(amount))txs.push({id:UID(),cid,date,desc,amount,matched:false,source:'ING'});
  }
  return txs;
}

// ── ABN AMRO CSV ──────────────────────────────────────────────
// Header: "Transactiedatum";"Valutacode";"Beginstand";"Eindstand";"Rentedatum";"Bedrag";"Omschrijving"
function parseABNcsv(raw,cid){
  const lines=raw.split('\n').map(l=>l.trim()).filter(Boolean);
  const txs=[];
  for(let i=1;i<lines.length;i++){
    const cols=splitCSV(lines[i]);
    if(cols.length<7)continue;
    const dateStr=cols[0].replace(/"/g,'').trim(); // YYYYMMDD or DD-MM-YYYY
    const amtStr=(cols[5]||'').replace(/"/g,'').replace(',','.').trim();
    const desc=(cols[6]||'').replace(/"/g,'').trim().slice(0,100);
    const amount=parseFloat(amtStr)||0;
    const date=parseDateNL(dateStr);
    if(date&&!isNaN(amount)&&amount!==0)txs.push({id:UID(),cid,date,desc,amount,matched:false,source:'ABN'});
  }
  return txs;
}

// ── Rabobank CSV ──────────────────────────────────────────────
// Header: "IBAN/BBAN";"Munt";"BIC";"Volgnr";"Datum";"Rentedatum";"Bedrag";"Saldo na trn";"Tegenpartij IBAN";"Tegenpartij naam";"Initiating party naam";"BIC tegenpartij";"Code";"Batch ID";"Transactiereferentie";"Machtigingskenmerk";"Incassant ID";"Betalingskenmerk";"Omschrijving-1";"Omschrijving-2";"Omschrijving-3"
function parseRabobankCsv(raw,cid){
  const lines=raw.split('\n').map(l=>l.trim()).filter(Boolean);
  const txs=[];
  for(let i=1;i<lines.length;i++){
    const cols=splitCSV(lines[i]);
    if(cols.length<7)continue;
    const dateStr=(cols[4]||'').replace(/"/g,'').trim();
    const amtStr=(cols[6]||'').replace(/"/g,'').replace(',','.').trim();
    const desc=[(cols[9]||''),(cols[18]||''),(cols[19]||''),(cols[20]||'')]
      .map(s=>s.replace(/"/g,'').trim()).filter(Boolean).join(' · ').slice(0,100);
    const amount=parseFloat(amtStr)||0;
    const date=parseDateNL(dateStr);
    if(date&&!isNaN(amount)&&amount!==0)txs.push({id:UID(),cid,date,desc,amount,matched:false,source:'Rabobank'});
  }
  return txs;
}

// ── Bunq CSV ─────────────────────────────────────────────────
// Header: "Date";"Amount";"Account";"Counterparty";"Name";"Description";"Category"
function parseBunqCsv(raw,cid){
  const lines=raw.split('\n').map(l=>l.trim()).filter(Boolean);
  const txs=[];
  for(let i=1;i<lines.length;i++){
    const cols=splitCSV(lines[i]);
    if(cols.length<6)continue;
    const dateStr=(cols[0]||'').replace(/"/g,'').trim(); // YYYY-MM-DD
    const amtStr=(cols[1]||'').replace(/"/g,'').replace(',','.').trim();
    const name=(cols[4]||'').replace(/"/g,'').trim();
    const memo=(cols[5]||'').replace(/"/g,'').trim();
    const desc=[name,memo].filter(Boolean).join(' — ').slice(0,100);
    const amount=parseFloat(amtStr)||0;
    const date=parseDateISO(dateStr);
    if(date&&!isNaN(amount)&&amount!==0)txs.push({id:UID(),cid,date,desc,amount,matched:false,source:'Bunq'});
  }
  return txs;
}

// ── Generic CSV fallback ──────────────────────────────────────
function parseGenericCsv(raw,cid){
  const lines=raw.split('\n').map(l=>l.trim()).filter(Boolean);
  const txs=[];
  const hdr=splitCSV(lines[0]).map(h=>h.toLowerCase().replace(/[^a-z]/g,''));
  const dateIdx=hdr.findIndex(h=>h.includes('dat'));
  const amtIdx=hdr.findIndex(h=>h.includes('bedrag')||h.includes('amount')||h.includes('amt'));
  const descIdx=hdr.findIndex(h=>h.includes('desc')||h.includes('omschr')||h.includes('memo')||h.includes('naam'));
  if(dateIdx<0||amtIdx<0){throw new Error('Could not detect date/amount columns');}
  for(let i=1;i<lines.length;i++){
    const cols=splitCSV(lines[i]);
    const dateStr=(cols[dateIdx]||'').replace(/"/g,'').trim();
    const amtStr=(cols[amtIdx]||'').replace(/"/g,'').replace(',','.').trim();
    const desc=descIdx>=0?(cols[descIdx]||'').replace(/"/g,'').trim().slice(0,100):'Import';
    const amount=parseFloat(amtStr)||0;
    const date=parseDateNL(dateStr)||parseDateISO(dateStr);
    if(date&&!isNaN(amount)&&amount!==0)txs.push({id:UID(),cid,date,desc,amount,matched:false,source:'CSV'});
  }
  return txs;
}

// ── MT940 parser ──────────────────────────────────────────────
function parseMT940(raw,cid){
  const txs=[];
  const blocks=raw.split(/(?=:20:)/);
  for(const block of blocks){
    const stmts=block.split(/^:61:/m);
    for(let i=1;i<stmts.length;i++){
      try{
        const stmt=stmts[i];
        const dateMatch=stmt.match(/^(\d{6})/);
        const amtMatch=stmt.match(/^[\d]{6}[\d]{4}?([CD])(\d+),(\d*)/);
        if(!dateMatch||!amtMatch)continue;
        const yy=dateMatch[1].slice(0,2),mm=dateMatch[1].slice(2,4),dd=dateMatch[1].slice(4,6);
        const yr=parseInt(yy)<50?2000+parseInt(yy):1900+parseInt(yy);
        const date=`${yr}-${mm}-${dd}`;
        const sign=amtMatch[1]==='D'?-1:1;
        const amount=sign*parseFloat(amtMatch[2]+'.'+( amtMatch[3]||'00'));
        // :86: = description
        const descMatch=stmt.match(/:86:([\s\S]*?)(?=\n:|$)/);
        const desc=descMatch?descMatch[1].replace(/\n/g,' ').trim().slice(0,100):'MT940 transaction';
        txs.push({id:UID(),cid,date,desc,amount,matched:false,source:'MT940'});
      }catch{}
    }
  }
  return txs;
}

// ── Date helpers ──────────────────────────────────────────────
function parseDateNL(s){
  // DD-MM-YYYY or YYYYMMDD or DD/MM/YYYY
  if(!s)return null;
  s=s.trim().replace(/"/g,'');
  if(/^\d{8}$/.test(s)) return `${s.slice(0,4)}-${s.slice(4,6)}-${s.slice(6,8)}`;
  const m=s.match(/^(\d{1,2})[-/](\d{1,2})[-/](\d{4})$/);
  if(m) return `${m[3]}-${m[2].padStart(2,'0')}-${m[1].padStart(2,'0')}`;
  return parseDateISO(s);
}
function parseDateISO(s){
  if(!s)return null;
  const m=s.trim().match(/^(\d{4})[-/](\d{1,2})[-/](\d{1,2})$/);
  if(m) return `${m[1]}-${m[2].padStart(2,'0')}-${m[3].padStart(2,'0')}`;
  return null;
}
function splitCSV(line){
  // Handles quoted fields with commas or semicolons
  const sep=line.includes(';')?';':',';
  const res=[];
  let cur='',inQ=false;
  for(let i=0;i<line.length;i++){
    if(line[i]==='"'){inQ=!inQ;}
    else if(line[i]===sep&&!inQ){res.push(cur);cur='';}
    else{cur+=line[i];}
  }
  res.push(cur);
  return res;
}

function exportReportPDF(type,cid){
  const c=S.clients.find(c=>c.id===cid);
  const jsPDF=window.jsPDF?.jsPDF||window.jspdf?.jsPDF||window.jsPDF;
  if(!jsPDF){toast('Loading PDF library...','ti-loader');return;}
  
  const doc=new jsPDF({unit:'mm',format:'a4'});
  const W=210,M=15,lineHeight=7;
  let y=M;
  
  // Header
  doc.setFont('helvetica','bold');
  doc.setFontSize(16);
  doc.text(`${c?.name||'Report'}`,M,y);
  y+=12;
  
  doc.setFontSize(10);
  doc.setFont('helvetica','normal');
  doc.text(`Report Type: ${type.toUpperCase()} | Generated: ${FD(new Date())}`,M,y);
  y+=10;
  
  doc.line(M,y,W-M,y);
  y+=8;
  
  // Content based on type
  if(type==='summary'){
    const inv=S.invoices.filter(i=>i.cid===cid&&i.status==='Betaald');
    const exp=S.expenses.filter(e=>e.cid===cid);
    const revenue=inv.reduce((s,i)=>s+(i.amount||0),0);
    const expenses=exp.reduce((s,e)=>s+(e.amount||0),0);
    const profit=revenue-expenses;
    
    doc.setFont('helvetica','bold');
    doc.setFontSize(12);
    doc.text('Financial Summary',M,y);y+=10;
    
    doc.setFont('helvetica','normal');
    doc.setFontSize(10);
    doc.text(`Total Revenue: ${FMT(revenue)}`,M,y);y+=lineHeight;
    doc.text(`Total Expenses: ${FMT(expenses)}`,M,y);y+=lineHeight;
    doc.setFont('helvetica','bold');
    doc.text(`Net Profit: ${FMT(profit)}`,M,y);y+=lineHeight;
  }
  
  doc.save(`Report_${type}_${c?.name}_${new Date().getFullYear()}.pdf`);
  toast('PDF exported successfully!');
}

function exportReportExcel(type,cid){
  const c=S.clients.find(c=>c.id===cid);
  const XLSX=window.XLSX;
  if(!XLSX){toast('Loading Excel library...','ti-loader');return;}
  
  let data=[];
  let sheets={};
  
  if(type==='summary'){
    const inv=S.invoices.filter(i=>i.cid===cid&&i.status==='Betaald');
    const exp=S.expenses.filter(e=>e.cid===cid);
    const revenue=inv.reduce((s,i)=>s+(i.amount||0),0);
    const expenses=exp.reduce((s,e)=>s+(e.amount||0),0);
    const profit=revenue-expenses;
    
    data=[
      ['Financial Summary Report'],
      ['Client',c?.name],
      ['Date Generated',FD(new Date())],
      [],
      ['Metric','Amount'],
      ['Total Revenue',revenue],
      ['Total Expenses',expenses],
      ['Net Profit',profit]
    ];
    sheets['Summary']=XLSX.utils.aoa_to_sheet(data);
  }else if(type==='pl'){
    const inv=S.invoices.filter(i=>i.cid===cid&&i.status==='Betaald');
    const exp=S.expenses.filter(e=>e.cid===cid);
    const revenue=inv.reduce((s,i)=>s+(i.amount||0),0);
    const expenses=exp.reduce((s,e)=>s+(e.amount||0),0);
    const profit=revenue-expenses;
    
    data=[
      ['Profit & Loss Statement'],
      ['Client',c?.name],
      [],
      ['REVENUE'],
      ['Description','Amount'],
      ['Total Revenue',revenue],
      [],
      ['EXPENSES'],
      ['Category','Amount']
    ];
    
    exp.forEach(e=>{
      data.push([e.cat||'Other',e.amount]);
    });
    
    data.push([]);
    data.push(['Total Expenses',expenses]);
    data.push([]);
    data.push(['NET PROFIT/LOSS',profit]);
    
    sheets['P&L']=XLSX.utils.aoa_to_sheet(data);
  }else if(type==='btw'){
    const inv=S.invoices.filter(i=>i.cid===cid&&i.status==='Betaald');
    const exp=S.expenses.filter(e=>e.cid===cid);
    const btwOut=inv.reduce((s,i)=>s+(i.btw||0),0);
    const btwIn=exp.reduce((s,e)=>s+(e.btw||0),0);
    const btwPayable=btwOut-btwIn;
    
    data=[
      ['VAT/BTW Return'],
      ['Client',c?.name],
      [],
      ['Item','Amount'],
      ['VAT Output',btwOut],
      ['VAT Input',btwIn],
      [],
      ['VAT Payable',btwPayable]
    ];
    sheets['BTW']=XLSX.utils.aoa_to_sheet(data);
  }else if(type==='expenses'){
    const expenses=S.expenses.filter(e=>e.cid===cid);
    data=[
      ['Expenses Report'],
      ['Client',c?.name],
      [],
      ['Date','Supplier','Description','Category','Amount']
    ];
    
    expenses.forEach(e=>{
      data.push([e.date,e.supplier,e.desc,e.cat||'Other',e.amount]);
    });
    
    const total=expenses.reduce((s,e)=>s+e.amount,0);
    data.push([]);
    data.push(['TOTAL','','','',total]);
    
    sheets['Expenses']=XLSX.utils.aoa_to_sheet(data);
  }
  
  const workbook=XLSX.utils.book_new();
  Object.entries(sheets).forEach(([name,sheet])=>{
    XLSX.utils.book_append_sheet(workbook,sheet,name);
  });
  
  XLSX.writeFile(workbook,`Report_${type}_${c?.name}_${new Date().getFullYear()}.xlsx`);
  toast('Excel exported successfully!');
}

function viewPendingAgreements(){
  if(!isAdmin()){
    alert('Only admins can view pending agreements');
    return;
  }
  
  if(!S.serviceAgreements||S.serviceAgreements.length===0){
    alert('No pending agreements');
    return;
  }
  
  const pending=S.serviceAgreements.filter(a=>a.status==='client_signed'||a.status==='pending_signature');
  
  if(pending.length===0){
    alert('No pending agreements to review');
    return;
  }
  
  let html='<div style="max-height:500px;overflow-y:auto">';
  
  pending.forEach(agreement=>{
    const client=agreement.clientData;
    const statusColor=agreement.status==='pending_signature'?'#FF6B6B':agreement.status==='client_signed'?'#FFD700':'#4ECDC4';
    const statusText=agreement.status==='pending_signature'?'Awaiting Signature':'Signed by Client';
    
    html+=`
    <div style="padding:12px;border:1px solid var(--gr2);border-radius:6px;margin-bottom:8px">
      <div style="display:flex;justify-content:space-between;align-items:start;margin-bottom:8px">
        <div>
          <div style="font-weight:600;color:var(--t1)">${client.name}</div>
          <div style="font-size:10px;color:var(--t3);margin-top:2px">
            KVK: ${client.kvk} | ${client.email}
          </div>
        </div>
        <span style="background:${statusColor}20;color:${statusColor};padding:4px 8px;border-radius:4px;font-size:9px;font-weight:600">
          ${statusText}
        </span>
      </div>
      
      <div style="font-size:10px;color:var(--t3);margin-bottom:8px">
        Created: ${agreement.createdDate}
        ${agreement.clientSignDate?'<br/>Signed: '+agreement.clientSignDate:''}
      </div>
      
      <div style="display:flex;gap:8px">
        <button class="btn btn-p btn-xs" onclick="showAgreementDetails('${agreement.id}')">👁 View</button>
        ${agreement.status==='client_signed'?`
        <button class="btn btn-success btn-xs" onclick="approvePendingAgreement('${agreement.id}')">✓ Approve</button>
        <button class="btn btn-danger btn-xs" onclick="rejectPendingAgreement('${agreement.id}')">✕ Reject</button>
        `:''}
      </div>
    </div>
    `;
  });
  
  html+='</div>';
  
  showModal('📋 Pending Service Agreements ('+pending.length+')',html);
}

function showAgreementDetails(agreementId){
  const agreement=S.serviceAgreements.find(a=>a.id===agreementId);
  if(!agreement)return;
  
  const client=agreement.clientData;
  const contractHTML=generateDutchContractHTML(client);
  
  showModal('📄 Agreement Details - '+client.name,`
    <div style="max-height:500px;overflow-y:auto;font-size:11px">
      ${contractHTML}
      
      <div style="margin-top:20px;padding:12px;background:rgba(10,34,24,0.08);border-radius:6px">
        <div style="font-weight:600;margin-bottom:8px">Status Information</div>
        <div style="font-size:10px;line-height:1.8">
          <strong>Status:</strong> ${agreement.status}<br/>
          <strong>Created:</strong> ${agreement.createdDate}<br/>
          ${agreement.clientSignDate?'<strong>Signed by:</strong> '+agreement.clientSignature+'<br/><strong>Sign Date:</strong> '+agreement.clientSignDate:''}
          ${agreement.adminSignDate?'<br/><strong>Admin Approved:</strong> '+agreement.adminSignDate:''}
        </div>
      </div>
    </div>
  `);
}

function approvePendingAgreement(agreementId){
  const agreement=S.serviceAgreements.find(a=>a.id===agreementId);
  if(!agreement){alert('Agreement not found');return;}
  
  if(agreement.status!=='client_signed'){
    alert('Agreement must be signed by client first');
    return;
  }
  
  if(!confirm('Approve this agreement and activate '+agreement.clientData.name+'?')){
    return;
  }
  
  const newClient={
    id:UID(),
    name:agreement.clientData.name,
    type:agreement.clientData.type,
    email:agreement.clientData.email,
    phone:agreement.clientData.phone,
    contactPerson:agreement.clientData.contactPerson,
    kvk:agreement.clientData.kvk,
    btw:agreement.clientData.btw,
    iban:agreement.clientData.iban,
    bic:agreement.clientData.bic,
    address:agreement.clientData.address,
    zipCode:agreement.clientData.zipCode,
    city:agreement.clientData.city,
    country:agreement.clientData.country,
    registrationNumber:agreement.clientData.registrationNumber,
    contractId:agreement.id,
    contractStatus:'active',
    activatedDate:TODAY(),
    color:'#4ECDC4',
    createdDate:TODAY()
  };
  
  S.clients.push(newClient);
  agreement.status='active';
  agreement.adminSignDate=TODAY();
  agreement.adminSignature=S.settings?.adminName||'Administrator';
  
  S.pendingClients=S.pendingClients.filter(c=>c.kvk!==agreement.clientData.kvk);
  
  sv();
  closeModal();
  toast('✓ '+newClient.name+' activated as client');
  
  renderContent();
}

function rejectPendingAgreement(agreementId){
  const agreement=S.serviceAgreements.find(a=>a.id===agreementId);
  if(!agreement)return;
  
  if(confirm('Reject this agreement? The pending client will be removed.')){
    agreement.status='rejected';
    agreement.adminSignDate=TODAY();
    S.pendingClients=S.pendingClients.filter(c=>c.kvk!==agreement.clientData.kvk);
    sv();
    closeModal();
    toast('✓ Agreement rejected');
    renderContent();
  }
}
