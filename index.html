<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0A2218">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="ANB FinAdmin">
<meta name="description" content="Professional accounting software for ZZP and freelancers">
<title>ANB Financial Services</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<!-- Tabler icons replaced with inline symbols -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
:root{
  --g1:#0A2218;--g2:#0F3025;--g3:#1A4A2A;--g4:#2A6040;
  --gold:#C89010;--gold2:#E0B830;--gold3:#F5DC70;--gold-light:#FDF8EC;
  --cream:#F8F6F0;--white:#FFF;--gr1:#F4F2EC;--gr2:#E6E2D8;--gr3:#C4C0B0;
  --t1:#1A1810;--t2:#48443A;--t3:#888070;
  --green:#1B5E35;--green-bg:#EAF4ED;
  --red:#8B1A1A;--red-bg:#FBE9E9;
  --orange:#7A4A00;--orange-bg:#FEF3E2;
  --blue:#0C3A6E;--blue-bg:#E8F0FB;
  --sw:240px;
  --fd:'Cormorant Garamond',Georgia,serif;
  --fb:'DM Sans',system-ui,sans-serif;
  --fm:'DM Mono',monospace;
  --r:10px;--rs:6px;
  --sh:0 1px 2px rgba(10,34,24,.07),0 6px 20px rgba(10,34,24,.11);
  --shl:0 14px 44px rgba(10,34,24,.24);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--fb);background:var(--cream);color:var(--t1);font-size:14px;line-height:1.5}

/* ═══ LOGIN PAGE ═══ */
#login-page{display:flex;align-items:center;justify-content:center;min-height:100vh;
  background:radial-gradient(ellipse at 40% 30%,#1A4A2A 0%,#0A2218 50%,#040E08 100%)}
.login-box{background:var(--white);border-radius:20px;padding:40px;width:100%;max-width:420px;
  box-shadow:0 24px 80px rgba(0,0,0,.4);text-align:center;position:relative}
.lang-switch{position:absolute;top:14px;right:14px;display:flex;gap:4px}
body.rtl .lang-switch{right:auto;left:14px}
.lang-btn{
  padding:7px 16px;
  border:2px solid #C89010;
  background:transparent;
  color:#C89010;
  border-radius:18px;
  cursor:pointer;
  font-weight:700;
  font-size:12px;
  transition:all 0.35s;
  text-transform:uppercase;
  letter-spacing:0.3px;
  box-shadow:0 2px 8px rgba(200,144,16,0.15);
}
.lang-btn:hover{
  background:rgba(200,144,16,0.12);
  box-shadow:0 4px 14px rgba(200,144,16,0.3);
  transform:scale(1.05);
}
.lang-btn.active{
  background:linear-gradient(135deg,#C89010 0%,#D4A520 100%);
  color:#0A2218;
  border:1px solid #C89010;
  box-shadow:0 4px 12px rgba(200,144,16,0.3);
}
.login-logo{margin-bottom:24px}
.login-logo svg{width:200px;height:70px}
.login-title{font-family:var(--fd);font-size:22px;font-weight:600;color:var(--g1);margin-bottom:6px}
.login-sub{font-size:12px;color:var(--t3);margin-bottom:28px}
.role-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:24px}
.role-card{
  padding:26px 20px;
  border:2px solid rgba(200,144,16,0.5);
  border-radius:14px;
  cursor:pointer;
  transition:all 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
  text-align:center;
  background:rgba(10,34,24,0.3);
  position:relative;
  overflow:hidden;
  box-shadow:0 4px 15px rgba(200,144,16,0.08);
  -webkit-tap-highlight-color:transparent;
}
.role-card::before{
  content:'';
  position:absolute;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:radial-gradient(circle at 50% 0%, rgba(200,144,16,0.08) 0%, transparent 70%);
  pointer-events:none;
  opacity:0;
  transition:opacity 0.4s ease;
}
.role-card:hover{
  border-color:#C89010;
  background:rgba(200,144,16,0.12);
  box-shadow:0 8px 25px rgba(200,144,16,0.2);
  transform:translateY(-4px);
}
.role-card:hover::before{
  opacity:1;
}
@media (hover: none) {
  .role-card:active{
    border-color:#C89010;
    background:rgba(200,144,16,0.15);
    box-shadow:0 6px 20px rgba(200,144,16,0.25);
    transform:translateY(-2px);
  }
  .role-card:active::before{
    opacity:1;
  }
}
.role-card.sel{
  background:linear-gradient(135deg,rgba(200,144,16,0.25) 0%,rgba(200,144,16,0.12) 100%) !important;
  border:2px solid #C89010 !important;
  box-shadow:
    0 0 0 1px rgba(200,144,16,0.3),
    0 8px 32px rgba(200,144,16,0.4),
    0 0 24px rgba(200,144,16,0.25),
    inset 0 1px 15px rgba(255,255,255,0.1),
    inset 0 0 20px rgba(200,144,16,0.1) !important;
  transform:scale(1.03) !important;
}
.role-card.sel::before{
  opacity:1 !important;
  background:radial-gradient(circle at 50% 0%, rgba(200,144,16,0.15) 0%, transparent 70%);
}
.role-card.sel::after{
  content:'';
  position:absolute;
  top:0;
  left:0;
  right:0;
  bottom:0;
  background:linear-gradient(135deg,rgba(212,165,32,0.15) 0%,transparent 50%);
  pointer-events:none;
}
.role-card.sel .ri{
  color:#C89010 !important;
  filter:drop-shadow(0 0 8px rgba(200,144,16,0.4));
}
.role-card.sel .rl{
  color:#D4A520 !important;
  font-weight:700 !important;
  text-shadow:0 0 12px rgba(200,144,16,0.3);
}
.role-card.sel .rs{
  color:rgba(255,255,255,.9) !important;
}
.ri{font-size:28px;color:var(--g3);margin-bottom:8px;display:block}
.rl{font-size:13px;font-weight:600;color:var(--t1);display:block}
.rs{font-size:11px;color:var(--t3);margin-top:2px;display:block}
.login-input-wrap{margin-bottom:14px;text-align:left}
.login-input-wrap label{display:block;font-size:11px;font-weight:600;color:var(--t3);
  text-transform:uppercase;letter-spacing:.6px;margin-bottom:4px}
.login-input-wrap input{width:100%;padding:10px 14px;border:1px solid var(--gr2);
  border-radius:var(--rs);font-size:14px;color:var(--t1);outline:none}
.login-input-wrap input:focus{border-color:var(--g1)}
.login-btn{width:100%;padding:12px;background:linear-gradient(135deg,var(--g1),var(--g3));
  color:var(--gold3);border:none;border-radius:var(--r);font-size:14px;font-weight:600;
  cursor:pointer;font-family:var(--fb);letter-spacing:.3px}
.login-btn:hover{filter:brightness(1.1)}
.login-err{background:var(--red-bg);color:var(--red);padding:8px 12px;border-radius:var(--rs);
  font-size:12px;margin-bottom:12px;display:none}
.login-hint{font-size:11px;color:var(--t3);margin-top:14px;line-height:1.6}
.login-hint code{background:var(--gr1);padding:1px 5px;border-radius:3px;font-family:var(--fm)}

/* ═══ MOBILE LOGIN OPTIMIZATION ═══ */
@media (max-width: 540px) {
  .login-main-container {
    padding-top: 60px !important;
    padding-left: 8px !important;
    padding-right: 8px !important;
    align-items: center !important;
  }
  .login-lang-switch {
    position: fixed !important;
    top: max(8px, calc(env(safe-area-inset-top) + 4px)) !important;
    right: 8px !important;
    z-index: 999 !important;
    margin: 0 !important;
  }
  .login-logo-container {
    margin-bottom: 8px !important;
    width: 100% !important;
    display: flex !important;
    justify-content: center !important;
  }
  #ll-logo { 
    min-height: 80px !important;
    max-height: 110px !important;
    max-width: 280px !important;
  }
  /* Step indicators container */
  .login-step-indicators { 
    margin-top: 20px !important;
    margin-bottom: 24px !important; 
    gap: 8px !important;
  }
  /* Individual indicators */
  #sd1, #sd2, #sd3 { 
    width: 6px !important; 
    height: 6px !important; 
  }
  /* Auth step containers */
  .auth-step {
    margin: 0 !important;
    padding: 0 !important;
  }
  /* Main titles */
  .auth-step h1 { 
    font-size: 26px !important; 
    margin-bottom: 4px !important;
    line-height: 1.2 !important;
  }
  /* Subtitles */
  .auth-step p { 
    font-size: 12px !important;
    margin-bottom: 12px !important;
  }
  /* Step title divs */
  .auth-step > div:nth-child(1) {
    margin-bottom: 20px !important;
  }
  /* Role cards grid */
  .auth-step div[style*="grid-template-columns:1fr 1fr"] {
    grid-template-columns: 1fr 1fr !important;
    gap: 10px !important;
    margin-bottom: 16px !important;
  }
  /* Role cards */
  .role-card { 
    padding: 14px 12px !important; 
    margin-bottom: 0 !important;
    border-radius: 10px !important;
  }
  .role-card svg { 
    width: 28px !important; 
    height: 28px !important; 
    margin-bottom: 6px !important;
  }
  .rl { 
    font-size: 12px !important;
    margin-bottom: 2px !important;
  }
  .rs { 
    font-size: 9px !important; 
  }
  /* Input sections */
  .auth-step div[style*="margin-bottom"] {
    margin-bottom: 10px !important;
  }
  #id-label, .auth-step label { 
    font-size: 8px !important; 
    margin-bottom: 4px !important; 
    letter-spacing: 0.3px !important;
  }
  input[type="email"], 
  input[type="tel"], 
  input[type="password"], 
  input[type="text"],
  #login-pw,
  #new-pw1,
  #new-pw2 {
    padding: 9px 10px !important; 
    font-size: 13px !important;
    height: auto !important;
  }
  /* Bottom links */
  .login-hint, 
  div[style*="display:inline-block;margin-bottom:20px"],
  div[onclick="goForgot()"] { 
    font-size: 9px !important; 
    margin-bottom: 10px !important;
  }
  /* Buttons */
  .login-btn { 
    padding: 10px 14px !important; 
    font-size: 12px !important;
    margin-bottom: 12px !important;
  }
  /* Back button */
  button[onclick="goBack(1)"] { 
    font-size: 10px !important; 
    margin-bottom: 12px !important;
  }
  /* Error messages */
  #login-err-1, #login-err-2, #login-err-3 {
    font-size: 10px !important;
    padding: 8px 10px !important;
    margin-bottom: 10px !important;
  }
  /* Password strength bar */
  #pw-bar { height: 2px !important; margin-top: 4px !important; }
  #pw-hint { font-size: 9px !important; margin-top: 4px !important; }
}

/* ═══ APP SHELL ═══ */
#app{display:none;flex;height:100vh;overflow:hidden}
.sidebar{width:var(--sw);flex-shrink:0;background:var(--g1);display:flex;flex-direction:column;
  overflow:hidden;position:relative}
.sidebar::after{content:'';position:absolute;inset:0;
  background:linear-gradient(180deg,rgba(26,74,42,.2) 0%,rgba(0,0,0,.3) 100%);pointer-events:none}
.sb-logo{padding:18px 14px 12px;border-bottom:1px solid rgba(255,255,255,.08);position:relative;z-index:1}
.sb-role-badge{display:inline-flex;align-items:center;gap:3px;padding:2px 6px;
  border-radius:12px;font-size:9px;font-weight:600;margin-bottom:4px;letter-spacing:.2px}
.badge-admin{background:linear-gradient(135deg,var(--gold),var(--gold2));color:var(--g1)}
.badge-client{background:rgba(245,220,112,.15);color:var(--gold3);border:1px solid rgba(245,220,112,.3)}
.sb-clients{flex:1;overflow-y:auto;padding:2px 4px;position:relative;z-index:1}
.sb-clients::-webkit-scrollbar{width:3px}
.sb-clients::-webkit-scrollbar-thumb{background:rgba(255,255,255,.15);border-radius:2px}
.sb-sec{padding:4px 8px 2px;position:relative;z-index:1}
.sb-sec-lbl{font-size:8px;color:rgba(255,255,255,.3);letter-spacing:.5px;text-transform:uppercase;padding:0 4px;margin-bottom:2px}
.cb{width:100%;text-align:left;padding:7px 8px;border:none;background:transparent;
  border-radius:var(--rs);cursor:pointer;display:flex;align-items:center;gap:7px;
  color:rgba(255,255,255,.55);font-size:12px;font-family:var(--fb);margin-bottom:1px;transition:all .15s}
.cb:hover{background:rgba(255,255,255,.08);color:rgba(255,255,255,.9)}
.cb.act{background:rgba(200,144,16,.18);color:var(--gold3)}
.cb-av{width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;
  font-size:9px;font-weight:600;flex-shrink:0}
.cb-nm{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.cb-tp{font-size:9px;opacity:.55;margin-top:1px}
.cb-dot{width:5px;height:5px;border-radius:50%;background:var(--gold2);flex-shrink:0}
.sb-foot{padding:8px;border-top:1px solid rgba(255,255,255,.08);position:relative;z-index:1}
.nb{width:100%;text-align:left;padding:7px 8px;border:none;background:transparent;
  border-radius:var(--rs);cursor:pointer;display:flex;align-items:center;gap:7px;
  color:rgba(255,255,255,.45);font-size:12px;font-family:var(--fb);margin-bottom:1px}
.nb:hover{background:rgba(255,255,255,.08);color:rgba(255,255,255,.9)}
.nb.act{color:var(--gold3);background:rgba(200,144,16,.12)}
.nb i,.cb i{font-size:13px;width:15px;text-align:center}
body.rtl .nb{text-align:right;flex-direction:row-reverse}
.sb-lang-row{display:flex;gap:4px;padding:6px 8px 2px}
.sb-lang-btn{flex:1;padding:4px 0;border:1px solid rgba(255,255,255,.15);background:transparent;
  color:rgba(255,255,255,.45);font-size:10px;font-weight:700;border-radius:4px;cursor:pointer;font-family:var(--fb)}
.sb-lang-btn:hover{background:rgba(255,255,255,.08);color:rgba(255,255,255,.8)}
.sb-lang-btn.act{background:var(--gold);color:var(--g1);border-color:var(--gold)}
.logout-btn{width:100%;text-align:left;padding:7px 8px;border:none;background:transparent;
  border-radius:var(--rs);cursor:pointer;display:flex;align-items:center;gap:7px;
  color:rgba(255,255,255,.3);font-size:12px;font-family:var(--fb);margin-top:4px}
.logout-btn:hover{color:var(--red);background:rgba(139,26,26,.15)}

/* ═══ MAIN ═══ */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
.topbar{height:52px;border-bottom:1px solid var(--gr2);background:var(--white);display:flex;
  align-items:center;padding:0 18px;gap:10px;flex-shrink:0;border-top:2px solid var(--gold)}
.tab-row{display:flex;gap:2px}
.tab{padding:5px 11px;border:none;background:transparent;border-radius:var(--rs);cursor:pointer;
  font-size:12px;color:var(--t3);display:flex;align-items:center;gap:4px;font-family:var(--fb)}
.tab:hover{background:var(--gr1);color:var(--t2)}
.tab.act{background:var(--g1);color:var(--gold3)}
.tab i{font-size:12px}
.tb-right{display:flex;gap:6px;margin-left:auto;flex-shrink:0;align-items:center}
.content{flex:1;overflow-y:auto;padding:18px 20px}
.content::-webkit-scrollbar{width:5px}
.content::-webkit-scrollbar-thumb{background:var(--gr2);border-radius:3px}

/* ═══ COMPONENTS ═══ */
.kgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:10px;margin-bottom:16px}
.kcard{background:var(--white);border:1px solid var(--gr2);border-radius:var(--r);padding:14px;box-shadow:var(--sh)}
.kl{font-size:10px;color:var(--t3);text-transform:uppercase;letter-spacing:.6px;margin-bottom:4px}
.kv{font-size:20px;font-weight:500;color:var(--t1);font-family:var(--fd)}
.ks{font-size:10px;color:var(--t3);margin-top:2px}
.card{background:var(--white);border:1px solid var(--gr2);border-radius:var(--r);overflow:hidden;margin-bottom:12px;box-shadow:var(--sh)}
.ch{padding:11px 14px;border-bottom:1px solid var(--gr1);display:flex;align-items:center;justify-content:space-between}
.ct{font-size:13px;font-weight:500;color:var(--t1)}
table{width:100%;border-collapse:collapse}
th{font-size:10px;font-weight:600;color:var(--t3);text-align:left;padding:8px 12px;
  border-bottom:1px solid var(--gr1);text-transform:uppercase;letter-spacing:.5px;
  background:var(--gr1);white-space:nowrap}
td{font-size:12px;padding:9px 12px;color:var(--t1);border-bottom:1px solid var(--gr1)}
tr:last-child td{border-bottom:none}
tr:hover td{background:var(--gr1)}
.bdg{display:inline-flex;align-items:center;padding:2px 7px;border-radius:20px;font-size:10px;font-weight:600;white-space:nowrap}
.b-paid{background:var(--green-bg);color:var(--green)}
.b-open{background:var(--orange-bg);color:var(--orange)}
.b-draft{background:var(--gr1);color:var(--t3);border:1px solid var(--gr2)}
.b-sent{background:var(--blue-bg);color:var(--blue)}
.b-over{background:var(--red-bg);color:var(--red)}
.btn{padding:6px 12px;border-radius:var(--rs);font-size:12px;cursor:pointer;
  display:inline-flex;align-items:center;gap:4px;border:1px solid var(--gr2);
  background:var(--white);color:var(--t2);font-family:var(--fb);white-space:nowrap}
.btn:hover{background:var(--gr1)}
.btn-p{background:var(--g1);color:var(--gold3);border-color:var(--g1)}
.btn-p:hover{background:var(--g2)}
.btn-gold{background:linear-gradient(135deg,var(--gold),var(--gold2));color:var(--g1);
  border-color:var(--gold);font-weight:600}
.btn-gold:hover{filter:brightness(1.08)}
.btn-xs{padding:3px 8px;font-size:11px}
.btn-danger{color:var(--red)}
.btn-danger:hover{background:var(--red-bg);border-color:var(--red-bg)}
.empty{text-align:center;padding:36px;color:var(--t3);font-size:13px}
.empty i{font-size:28px;display:block;margin-bottom:8px;opacity:.4}

/* ═══ CLIENT PORTAL SPECIFIC ═══ */
.client-welcome{background:linear-gradient(135deg,var(--g1),var(--g3));
  border-radius:var(--r);padding:20px 24px;margin-bottom:16px;
  display:flex;align-items:center;justify-content:space-between}
.cw-text h2{font-family:var(--fd);font-size:22px;color:var(--gold3);font-weight:600;margin-bottom:4px}
.cw-text p{font-size:12px;color:rgba(255,255,255,.6)}
.cw-av{width:52px;height:52px;border-radius:50%;display:flex;align-items:center;
  justify-content:center;font-size:20px;font-weight:700;font-family:var(--fd)}
.msg-thread{display:flex;flex-direction:column;gap:10px;padding:14px}
.msg{max-width:80%;padding:10px 14px;border-radius:var(--r);font-size:13px;line-height:1.5}
.msg-anb{background:var(--g1);color:rgba(255,255,255,.9);align-self:flex-start;
  border-bottom-left-radius:3px}
.msg-anb .msg-from{font-size:10px;color:var(--gold2);font-weight:600;margin-bottom:4px}
.msg-client{background:var(--gold-light);color:var(--t1);align-self:flex-end;
  border-bottom-right-radius:3px;border:1px solid rgba(200,144,16,.2)}
.msg-client .msg-from{font-size:10px;color:var(--gold);font-weight:600;margin-bottom:4px;text-align:right}
.msg-time{font-size:10px;opacity:.5;margin-top:4px}
.msg-input-row{display:flex;gap:8px;padding:12px 14px;border-top:1px solid var(--gr1)}
.msg-input-row input{flex:1;padding:8px 12px;border:1px solid var(--gr2);
  border-radius:var(--rs);font-size:13px;outline:none}
.msg-input-row input:focus{border-color:var(--g1)}
.doc-upload-zone{border:2px dashed var(--gr2);border-radius:var(--r);padding:24px;
  text-align:center;cursor:pointer;transition:all .15s;background:var(--gr1);margin-bottom:12px}
.doc-upload-zone:hover{border-color:var(--g1);background:var(--green-bg)}
.doc-upload-zone i{font-size:28px;color:var(--gr3);display:block;margin-bottom:6px}
.doc-item{display:flex;align-items:center;gap:10px;padding:10px 14px;
  border-bottom:1px solid var(--gr1)}
.doc-item:last-child{border-bottom:none}
.doc-icon{width:32px;height:32px;border-radius:var(--rs);background:var(--green-bg);
  display:flex;align-items:center;justify-content:center;color:var(--green);font-size:16px;flex-shrink:0}

/* ═══ ADMIN SPECIFIC ═══ */
.all-stats-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:10px;margin-bottom:16px}
.stat-card{background:var(--white);border:1px solid var(--gr2);border-radius:var(--r);
  padding:16px;box-shadow:var(--sh);position:relative;overflow:hidden;transition:all .3s ease}
.stat-card:hover{transform:translateY(-4px);box-shadow:0 8px 24px rgba(0,0,0,.12);border-color:var(--gold)}
.stat-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px}
.stat-card.sc-gold::before{background:linear-gradient(90deg,var(--gold),var(--gold3))}
.stat-card.sc-green::before{background:var(--green)}
.stat-card.sc-red::before{background:var(--red)}
.stat-card.sc-blue::before{background:var(--blue)}

.stat-card.sc-purple::before{background:#9C27B0}
.stat-card.sc-pink::before{background:#E91E63}
.sc-icon{font-size:22px;margin-bottom:8px;display:block}
.sc-val{font-size:24px;font-weight:600;font-family:var(--fd);color:var(--t1);margin-bottom:2px}
.sc-lbl{font-size:11px;color:var(--t3)}
.client-row-card{background:var(--white);border:1px solid var(--gr2);border-radius:var(--r);
  padding:14px 16px;display:flex;align-items:center;gap:12px;margin-bottom:8px;
  cursor:pointer;transition:all .15s;box-shadow:var(--sh)}
.client-row-card:hover{border-color:var(--gold);box-shadow:var(--shl);transform:translateX(2px)}
.crc-av{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;
  justify-content:center;font-size:14px;font-weight:700;flex-shrink:0;font-family:var(--fd)}
.crc-info{flex:1;min-width:0}
.crc-name{font-size:14px;font-weight:500;color:var(--t1)}
.crc-meta{font-size:11px;color:var(--t3);margin-top:2px}
.crc-stats{display:flex;gap:14px;flex-shrink:0}
.crc-stat{text-align:right}
.crc-stat-val{font-size:13px;font-weight:600;font-family:var(--fd)}
.crc-stat-lbl{font-size:10px;color:var(--t3)}

/* ═══ MODAL ═══ */
.overlay{position:fixed;inset:0;background:rgba(10,34,24,.5);display:flex;
  align-items:flex-start;justify-content:center;padding-top:50px;z-index:500;backdrop-filter:blur(2px)}
.modal{background:var(--white);border:1px solid var(--gr2);border-radius:var(--r);
  width:100%;max-width:520px;max-height:84vh;overflow-y:auto;box-shadow:var(--shl);flex-shrink:0}
.mh{padding:14px 18px;border-bottom:1px solid var(--gr1);display:flex;align-items:center;justify-content:space-between}
.mt{font-family:var(--fd);font-size:18px;font-weight:600;color:var(--g1)}
.mb{padding:16px 18px}
.mf{padding:10px 18px;border-top:1px solid var(--gr1);display:flex;gap:8px;justify-content:flex-end;background:var(--gr1)}
.fg{margin-bottom:10px}

  border-radius:var(--rs);font-size:13px;color:var(--t1);background:var(--white);

.fg input:focus,.fg select:focus{border-color:var(--g1)}
.fr2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.itot{background:var(--gold-light);border:1px solid rgba(200,144,16,.2);border-radius:var(--rs);padding:10px 12px;margin-top:8px}
.itr{display:flex;justify-content:space-between;font-size:12px;padding:2px 0;color:var(--t2)}
.itr.fin{font-size:15px;font-weight:600;color:var(--g1);padding-top:7px;
  border-top:1px solid rgba(200,144,16,.2);margin-top:4px;font-family:var(--fd)}

/* ═══ NOTIFICATIONS ═══ */
.notif{position:fixed;bottom:20px;right:20px;background:var(--g1);color:var(--gold3);
  padding:10px 18px;border-radius:var(--r);font-size:13px;box-shadow:var(--shl);
  z-index:9999;transform:translateY(60px);opacity:0;transition:all .3s;
  display:flex;align-items:center;gap:8px;border-left:3px solid var(--gold)}
.notif.show{transform:translateY(0);opacity:1}

/* ═══ SETTINGS ═══ */
.settings-section{background:var(--white);border:1px solid var(--gr2);border-radius:var(--r);
  padding:18px;margin-bottom:12px}
.settings-section h3{font-family:var(--fd);font-size:16px;font-weight:600;color:var(--g1);
  margin-bottom:14px;padding-bottom:8px;border-bottom:1px solid var(--gr1)}

/* ═══ BTW ═══ */
.btw-box{background:var(--gr1);border-radius:var(--rs);overflow:hidden;margin-bottom:10px}
.btr{display:flex;justify-content:space-between;padding:10px 14px;border-bottom:1px solid var(--gr2);font-size:13px}
.btr:last-child{border-bottom:none;font-weight:600;font-size:15px;font-family:var(--fd)}

/* ═══ PROGRESS ═══ */
.prog-bar{height:4px;background:var(--gr2);border-radius:2px;overflow:hidden;margin-top:5px}
.prog-fill{height:4px;border-radius:2px;background:linear-gradient(90deg,var(--g3),var(--gold))}
/* ── AUTH FLOW ── */
.forgot-link{font-size:12px;color:var(--g3);cursor:pointer;text-decoration:underline;display:block;text-align:right;margin:-4px 0 12px}
.forgot-link:hover{color:var(--gold)}
.auth-step{display:none}
.auth-step.active{display:block}
.step-dots{display:flex;gap:5px;justify-content:center;margin-bottom:18px}
.sd{width:7px;height:7px;border-radius:50%;background:var(--gr2);transition:all .2s}
.sd.on{background:var(--g1);width:18px;border-radius:3px}
.sbox-ok{background:var(--green-bg);border:1px solid rgba(27,94,53,.2);border-radius:var(--rs);padding:10px 14px;font-size:12px;color:var(--green);margin-bottom:12px;display:flex;gap:7px;align-items:center;line-height:1.5}
.sbox-info{background:#E8F0FB;border:1px solid rgba(12,58,110,.15);border-radius:var(--rs);padding:10px 14px;font-size:12px;color:var(--blue);margin-bottom:12px;line-height:1.6}
.pw-strength{height:4px;border-radius:2px;margin-top:4px;transition:all .3s}
.pw-hint{font-size:10px;color:var(--t3);margin-top:3px}
.back-link{font-size:12px;color:var(--t3);cursor:pointer;margin-bottom:14px;display:inline-flex;align-items:center;gap:4px}

/* ═══ HAMBURGER / MOBILE SIDEBAR ═══ */
.hamburger-btn{display:none;width:34px;height:34px;border:none;background:transparent;
  font-size:20px;color:var(--g1);cursor:pointer;align-items:center;justify-content:center;
  border-radius:var(--rs);flex-shrink:0;margin-right:4px}
.hamburger-btn:hover{background:var(--gr1)}
.sidebar-backdrop{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:190}
.sidebar-backdrop.show{display:block}

/* ═══ INSTALL BANNER ═══ */
.install-banner{position:fixed;left:14px;right:14px;bottom:14px;display:none;align-items:center;
  gap:12px;background:var(--white);border-radius:14px;padding:12px 14px;
  box-shadow:0 12px 40px rgba(10,34,24,.35);border-left:4px solid var(--gold);z-index:300;
  transform:translateY(30px);opacity:0;transition:all .3s}
.install-banner.show{display:flex;transform:translateY(0);opacity:1}
.install-banner-text{flex:1;display:flex;flex-direction:column;gap:1px;min-width:0}
.install-banner-text strong{font-size:13px;color:var(--t1)}
.install-banner-text span{font-size:11px;color:var(--t3)}
.install-btn{background:linear-gradient(135deg,var(--g1),var(--g3));color:var(--gold3);
  border:none;border-radius:8px;padding:8px 14px;font-size:12px;font-weight:600;
  cursor:pointer;white-space:nowrap;font-family:var(--fb)}
.install-close{background:transparent;border:none;font-size:18px;color:var(--t3);
  cursor:pointer;padding:0 2px;line-height:1}

/* ═══ MOBILE BOTTOM NAV ═══ */
.mobile-nav{display:none;position:fixed;left:0;right:0;bottom:0;background:var(--white);
  border-top:1px solid var(--gr2);box-shadow:0 -4px 16px rgba(0,0,0,.08);z-index:150;
  padding:4px 2px env(safe-area-inset-bottom,4px)}
.mobile-nav.hidden{display:none !important}
.mn-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;
  background:transparent;border:none;padding:6px 2px;cursor:pointer;color:var(--t3)}
.mn-item.act{color:var(--g1)}
.mn-ico{font-size:17px;line-height:1}
.mn-lbl{font-size:9.5px;font-weight:500;letter-spacing:.2px}

/* ═══ RESPONSIVE: MOBILE LAYOUT ═══ */
@media (max-width: 860px){
  #lang-switch {
    position: fixed !important;
    top: max(8px, calc(env(safe-area-inset-top) + 4px)) !important;
    right: 8px !important;
    z-index: 999 !important;
    margin: 0 !important;
    padding: 8px 12px !important;
  }

  #login-page > div[style*="max-width:480px"] {

  }

    margin-bottom: 16px !important;
  }
  #app > div:nth-child(2) > div:nth-child(2) {
    margin-bottom: 24px !important;
  }
  #app > div:nth-child(2) > div:nth-child(3) {
    margin-bottom: 24px !important;
  }
  .hamburger-btn{display:inline-flex}

  .sidebar{position:fixed;top:0;left:0;height:100vh;z-index:200;
    transform:translateX(-100%);transition:transform .25s ease;box-shadow:0 0 40px rgba(0,0,0,.35)}
  .sidebar.open{transform:translateX(0)}
  .sidebar.open ~ .sidebar-backdrop{display:block}
  .main{width:100%}
  .content{padding-bottom:74px}
  .mobile-nav{display:flex}
  .tab-row{display:none !important}
  .tab-row::-webkit-scrollbar{display:none}
  .topbar{padding:0 10px}
  .all-stats-row{grid-template-columns:repeat(2,1fr)!important}
  .card{overflow-x:auto}
  .card table{min-width:640px}
}
@media (min-width: 861px){
  .mobile-nav{display:none!important}
  .sidebar-backdrop{display:none!important}
}

/* ════════════════════ MOBILE OPTIMIZATIONS ════════════════════ */

    padding:20px 16px;
  }

  }

}

function t(key, vars){
  var lang=(typeof S!=='undefined'&&S.lang)||getLang();
  var dict=I18N&&I18N[lang]||{};
  var str=dict[key]||(I18N&&I18N.en&&I18N.en[key])||key;
  // Add official Dutch term in parentheses for non-NL languages,
  // but only for keys that are NOT status keys (st_*) since those already embed the NL term
  var isStatusKey=key&&key.startsWith('st_');
  if(DUTCH_OFFICIAL&&DUTCH_OFFICIAL[key]&&lang!=='nl'&&!isStatusKey)str+=` (${DUTCH_OFFICIAL[key]})`;
  if(vars)Object.keys(vars).forEach(k=>{str=str.replace(`{${k}}`,vars[k]);});
  return str;
}

const CLOUD_SYNC_ARRAY_KEYS=['clients','invoices','expenses','hours','docs','messages','journal','bankTx','recurring','yearClosings','contracts','assets'];
let cloudSyncTimer=null;

function cloudHeaders(extra){
  return Object.assign({'apikey':CLOUD_SYNC_KEY,'Authorization':'Bearer '+CLOUD_SYNC_KEY,'Content-Type':'application/json'},extra||{});
}

async function cloudPull(){
  try{
    const res=await fetch(`${CLOUD_SYNC_URL}?id=eq.${CLOUD_ROW_ID}&select=payload,updated_at`,{headers:cloudHeaders()});
    if(!res.ok)throw new Error('HTTP '+res.status);
    const rows=await res.json();
    return (rows&&rows.length)?rows[0]:null;
  }catch(e){return null;}
}

function mergeArraysById(localArr,cloudArr){
  localArr=localArr||[];cloudArr=cloudArr||[];
  const map=new Map();
  cloudArr.forEach(it=>{if(it&&it.id&&!it.deleted)map.set(it.id,it);});
  localArr.forEach(it=>{if(it&&it.id){
    if(it.deleted)map.delete(it.id); // Remove deleted items
    else map.set(it.id,it); // Local copy wins on same-id
  }});
  return Array.from(map.values());
}

async function syncNow(){
  if(cloudSyncInFlight)return; // avoid overlapping syncs
  cloudSyncInFlight=true;
  cloudSyncStatus='syncing';updateSyncBadge();
  const cloud=await cloudPull();
  if(cloud===null){
    cloudSyncStatus='offline';updateSyncBadge();cloudSyncInFlight=false;return;
  }
  const cloudPayload=cloud.payload||{};
  const merged={};
  CLOUD_SYNC_ARRAY_KEYS.forEach(k=>{merged[k]=mergeArraysById(S[k],cloudPayload[k]);});
  const hadChanges=CLOUD_SYNC_ARRAY_KEYS.some(k=>merged[k].length!==S[k].length);
  CLOUD_SYNC_ARRAY_KEYS.forEach(k=>{S[k]=merged[k];});
  if(!S.settings)S.settings=cloudPayload.settings||{};
  try{
    const nowIso=new Date().toISOString();
    const res=await fetch(`${CLOUD_SYNC_URL}?id=eq.${CLOUD_ROW_ID}`,{
      method:'PATCH',headers:cloudHeaders({'Prefer':'return=minimal'}),
      body:JSON.stringify({payload:{...merged,settings:S.settings},updated_at:nowIso})
    });
    if(!res.ok)throw new Error('HTTP '+res.status);
    localStorage.setItem('anb5_synced_at',nowIso);
    try{saveLocalCache();}catch{}
    cloudSyncStatus='synced';
  }catch(e){
    cloudSyncStatus='error';
  }
  updateSyncBadge();
  cloudSyncInFlight=false;
  // ✅ Only re-render if there were actual changes AND not viewing messages
  if(S.role&&hadChanges&&S.tab!=='messages')renderApp();
}

function scheduleSync(){
  clearTimeout(cloudSyncTimer);
  cloudSyncTimer=setTimeout(syncNow,1200);
}

    if(el)el.innerHTML=html;
  });
}

// STEP 1 → 2: verify identity
function goStep2(){
  const id=document.getElementById('login-id').value.trim();
  showErr('login-err-1','');
  if(!id){showErr('login-err-1','Please enter your email or phone number');return;}

  if(selRoleVal==='admin'){
    // Check against admin email or phone
    const co=S.settings;
    const match=(id===co.email||id===co.phone||id===co.adminIdentifier||
                 id.toLowerCase()===co.email?.toLowerCase());
    if(!match){showErr('login-err-1','Email or phone not found for admin account');return;}
    authState={role:'admin',identifier:id,clientId:null,isFirstTime:!co.adminPwSet};
    const name=document.getElementById('step2-name');
    const sub=document.getElementById('step2-sub');
    if(name)name.textContent='ANB Administrator';
    if(sub)sub.textContent='Enter your password to continue';
  } else {
    // Find client by email or phone
    const c=S.clients.find(c=>
      c.email&&c.email.toLowerCase()===id.toLowerCase()||
      c.phone&&c.phone===id||
      c.phone&&c.phone.replace(/\s/g,'')===id.replace(/\s/g,'')
    );
    if(!c){showErr('login-err-1','No account found with this email or phone number');return;}
    authState={role:'client',identifier:id,clientId:c.id,isFirstTime:!c.pwSet};
    const name=document.getElementById('step2-name');
    const sub=document.getElementById('step2-sub');
    if(name)name.textContent='Welcome, '+c.name.split(' ')[0]+'!';
    if(sub)sub.textContent=c.type+' · '+c.email;
  }
  showErr('login-err-2','');
  goStep(2);
  setTimeout(()=>document.getElementById('login-pw')?.focus(),100);
}

// STEP 2: sign in
function doLogin(){
  const pw=document.getElementById('login-pw').value;
  showErr('login-err-2','');
  if(!pw){showErr('login-err-2','Please enter your password');return;}

  if(authState.role==='admin'){
    const stored=S.settings.adminPwCustom||S.settings.adminPw;
    if(pw!==stored){showErr('login-err-2','Incorrect password');return;}
    S.role='admin';S.currentClient=null;S.tab='dashboard';
  } else {
    const c=S.clients.find(c=>c.id===authState.clientId);
    const stored=c.pwCustom||c.pw;
    if(!c||pw!==stored){showErr('login-err-2','Incorrect password');return;}
    S.role='client';S.currentClient=c.id;S.tab='dashboard';
  }
  launchApp();
}

    if(!match){goStep(1);showErr('login-err-1','Email or phone not found');return;}
    authState={role:'admin',identifier:id,clientId:null};
    const t=document.getElementById('step3-title');
    const s=document.getElementById('step3-sub');
    const b=document.getElementById('step3-identity-box');
    if(t)t.textContent='Set admin password';
    if(s)s.textContent='You are setting the password for ANB Administrator';
    if(b)b.innerHTML='🛡 <strong>ANB Administrator</strong><br>'+id;
  } else {
    const c=S.clients.find(c=>c.id===authState.clientId)||
             S.clients.find(c=>c.email?.toLowerCase()===id.toLowerCase()||c.phone===id);
    if(!c){goStep(1);showErr('login-err-1','No account found');return;}
    authState={role:'client',identifier:id,clientId:c.id};
    const t=document.getElementById('step3-title');
    const s=document.getElementById('step3-sub');
    const b=document.getElementById('step3-identity-box');
    if(t)t.textContent='Set your password';
    if(s)s.textContent='Choose a new password for your account';
    if(b)b.innerHTML='👤 <strong>'+c.name+'</strong><br>'+id;
  }
  document.getElementById('new-pw1').value='';
  document.getElementById('new-pw2').value='';
  document.getElementById('pw-bar').style.cssText='';
  document.getElementById('pw-hint').textContent='';
  goStep(3);
  setTimeout(()=>document.getElementById('new-pw1')?.focus(),100);
}

// Password strength checker
function checkPwStrength(){
  const pw=document.getElementById('new-pw1').value;
  const bar=document.getElementById('pw-bar');
  const hint=document.getElementById('pw-hint');
  if(!pw){bar.style.cssText='';hint.textContent='';return;}
  let score=0;
  if(pw.length>=6)score++;
  if(pw.length>=10)score++;
  if(/[A-Z]/.test(pw))score++;
  if(/[0-9]/.test(pw))score++;
  if(/[^A-Za-z0-9]/.test(pw))score++;
  const levels=[
    {w:'20%',bg:'#f07070',t:'Too short'},
    {w:'40%',bg:'#f0a050',t:'Weak'},
    {w:'60%',bg:'#f0c840',t:'Fair'},
    {w:'80%',bg:'#7ab850',t:'Good'},
    {w:'100%',bg:'#1B5E35',t:'Strong ✓'},
  ];
  const l=levels[Math.min(score,4)];
  bar.style.cssText=`width:${l.w};background:${l.bg};height:4px;border-radius:2px;margin-top:4px;transition:all .3s`;
  hint.textContent=l.t;
  hint.style.color=l.bg;
}

// Save new password
function doSetPassword(){
  const pw1=document.getElementById('new-pw1').value;
  const pw2=document.getElementById('new-pw2').value;
  showErr('login-err-3','');
  if(pw1.length<6){showErr('login-err-3','Password must be at least 6 characters');return;}
  if(pw1!==pw2){showErr('login-err-3','Passwords do not match');return;}

  if(authState.role==='admin'){
    S.settings.adminPwCustom=pw1;
    S.settings.adminPwSet=true;
  } else {
    const idx=S.clients.findIndex(c=>c.id===authState.clientId);
    if(idx>=0){
      S.clients[idx].pwCustom=pw1;
      S.clients[idx].pwSet=true;
    }
  }
  sv();

  // Show success then launch
  goStep('ok');
  S.role=authState.role;
  S.currentClient=authState.role==='client'?authState.clientId:null;
  S.tab='dashboard';
  setTimeout(()=>launchApp(),1500);
}

function launchApp(){
  // Check for agreement token in URL
  const params=new URLSearchParams(window.location.search);
  const tokenParam=params.get('agreement-token');
  
  if(tokenParam){
    // Show agreement page without login
    showClientAgreementPage(tokenParam);
    document.getElementById('login-page').style.display='none';
    document.getElementById('app').style.display='flex';
    return;
  }
  
  document.getElementById('login-page').style.display='none';
  document.getElementById('app').style.display='flex';
  checkOverdueInvoices();
  generateRecurringInvoices();
  renderApp();
  syncNow();
}

function doLogout(){
  S.role=null;S.currentClient=null;S.tab='dashboard';S.lang='en';

function saveContract(contractId,cid){
  const title=document.getElementById('contract-title')?.value||'';
  const desc=document.getElementById('contract-desc')?.value||'';
  const type=document.getElementById('contract-type')?.value||'Standard';
  const startDate=document.getElementById('contract-start')?.value||'';
  const endDate=document.getElementById('contract-end')?.value||'';
  const status=document.getElementById('contract-status')?.value||'draft';
  
  if(!title){alert('Contract title required');return;}
  
  if(!S.contracts)S.contracts=[];
  
  if(contractId){
    // Update existing
    const idx=S.contracts.findIndex(c=>c.id===contractId);
    if(idx>=0){
      S.contracts[idx]={...S.contracts[idx],title,desc,type,startDate,endDate,status};
    }
  }else{
    // Add new
    S.contracts.push({
      id:UID(),
      cid:cid,
      title:title,
      desc:desc,
      type:type,
      startDate:startDate,
      endDate:endDate,
      status:status,
      createdDate:TODAY()
    });
  }
  
  sv();
  setTab('contracts');
  closeModal();
}

function deleteContract(contractId){
  if(!confirm('Delete this contract?'))return;
  if(S.contracts){
    S.contracts=S.contracts.filter(c=>c.id!==contractId);
    sv();
    setTab('contracts');
  }
}

    <textarea id="asset-desc" placeholder="Description"

    <input type="number" id="asset-value" placeholder="Value (€)" 
      style="width:100%;padding:10px;margin-bottom:10px;border:1px solid var(--gr2);border-radius:6px;background:var(--bg1);color:var(--t1)">

}

function saveAsset(cid){
  const name=document.getElementById('asset-name')?.value||'';
  const desc=document.getElementById('asset-desc')?.value||'';
  const value=parseFloat(document.getElementById('asset-value')?.value||0);
  
  if(!name){alert('Asset name required');return;}
  
  if(!S.assets)S.assets=[];
  S.assets.push({
    id:UID(),
    cid:cid,
    name:name,
    desc:desc,
    value:value,
    date:TODAY()
  });
  
  sv();
  setTab('assets');
  closeModal();
}

function renderClientsList(searchTerm){
  const container=document.getElementById('clients-list-container');
  if(!container)return;
  
  const term=searchTerm.toLowerCase().trim();
  const planFilter=document.getElementById('plan-filter')?.value||'';
  
  // فلترة حسب البحث والباقة
  const filtered=S.clients.filter(c=>{
    if(c.deleted)return false;
    const matchesSearch=term===''||c.name.toLowerCase().includes(term)||c.email.toLowerCase().includes(term)||c.phone.includes(term);
    const matchesPlan=planFilter===''||c.monthlyFee===planFilter;
    return matchesSearch&&matchesPlan;
  });
  
  if(filtered.length===0){
    container.innerHTML=`<div style="text-align:center;padding:32px;color:var(--t3)">${t('no_data')}</div>`;
    return;
  }
  
  // ألوان الباقات - محسّنة وأكثر تمييزاً
  const planColors={
    '€100':'#0A2218',
    '€150':'#4da876',
    '€200':'#9B59B6'
  };
  
  const planBgColors={
    '€100':'#E8F4F0',    // تفاحي أخضر فاتح
    '€150':'#E0F5ED',    // نعناعي فاتح
    '€200':'#F3E8FB'     // بنفسجي فاتح
  };
  
  const planBorderColors={
    '€100':'#2d7a4f',    // أخضر متوسط
    '€150':'#3FA384',    // أخضر ناعم متوسط
    '€200':'#B59CC8'     // بنفسجي متوسط
  };
  
  container.innerHTML=filtered.map(c=>{
    // حساب التنبيهات
    const inv=S.invoices.filter(i=>i.cid===c.id&&!i.deleted);
    const overdue=inv.filter(i=>i.status==='Verlopen').length;
    const pending=inv.filter(i=>['Openstaand','Verzonden'].includes(i.status)).length;
    const exp=S.expenses.filter(e=>e.cid===c.id&&!e.deleted).length;
    const msgs=S.messages.filter(m=>m.cid===c.id&&m.from==='anb'&&!m.isRead&&!m.deleted).length;
    
    // حساب إجمالي التنبيهات
    const totalAlerts=overdue+pending+(exp>0?1:0)+(msgs>0?1:0);
    
    // نوع الباقة
    const planType=c.monthlyFee||'Standard';
    const planColor=planColors[planType]||'#0A2218';
    const planBg=planBgColors[planType]||'#E8F4F0';
    const planBorder=planBorderColors[planType]||'#2d7a4f';
    
    return `
    <div onclick="selClient('${c.id}')" style="padding:16px;background:${planBg};border:3px solid ${planBorder};border-radius:12px;margin-bottom:12px;cursor:pointer;transition:all .3s ease;display:flex;justify-content:space-between;align-items:center;box-shadow:0 2px 8px rgba(0,0,0,0.06)"
      onmouseover="this.style.transform='translateX(8px)';this.style.boxShadow='0 8px 16px rgba(0,0,0,0.12)';this.style.borderColor='${planColor}';this.style.borderWidth='3px'" 
      onmouseout="this.style.transform='translateX(0)';this.style.boxShadow='0 2px 8px rgba(0,0,0,0.06)';this.style.borderColor='${planBorder}';this.style.borderWidth='3px'">
      
      <div style="flex:1;display:flex;gap:12px;align-items:center">
        <div class="cb-av" style="width:48px;height:48px;font-size:18px;flex-shrink:0;background:${c.color}22;color:${c.color};border:3px solid ${c.color}">${INI(c.name)}</div>
        <div style="flex:1;min-width:0">
          <div style="font-weight:700;color:var(--t1);margin-bottom:4px;display:flex;align-items:center;gap:8px;font-size:14px">
            ${c.name}
            <span style="font-size:11px;background:${planColor};color:white;padding:4px 10px;border-radius:6px;font-weight:600">${planType}</span>
          </div>
          <div style="font-size:11px;color:var(--t3);margin-bottom:6px">${c.email}${c.phone?' • '+c.phone:''}</div>
          <div style="font-size:11px;color:var(--t3);display:flex;gap:10px;flex-wrap:wrap">
            ${inv.length>0?'<span style="background:rgba(77,168,118,0.15);padding:2px 6px;border-radius:3px">📄 '+inv.length+'</span>':''}
            ${exp>0?'<span style="background:rgba(217,83,79,0.15);padding:2px 6px;border-radius:3px">🧾 '+exp+'</span>':''}
            ${c.contractStartDate?'<span style="background:rgba(200,144,16,0.15);padding:2px 6px;border-radius:3px">📋 Active</span>':''}
          </div>
        </div>
      </div>
      
      <div style="display:flex;flex-direction:column;gap:8px;align-items:flex-end;flex-shrink:0">
        ${totalAlerts>0?'<div style="background:#d9534f;color:white;font-weight:700;width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px;box-shadow:0 2px 6px rgba(217,83,79,0.3)">'+totalAlerts+'</div>':''}
        ${overdue>0?'<div style="background:#ffcdd2;color:#c62828;font-size:11px;padding:4px 8px;border-radius:5px;font-weight:600">⚠️ '+overdue+'</div>':''}
        ${pending>0?'<div style="background:#ffe0b2;color:#e65100;font-size:11px;padding:4px 8px;border-radius:5px;font-weight:600">⏳ '+pending+'</div>':''}
        ${msgs>0?'<div style="background:#c8e6c9;color:#1b5e20;font-size:11px;padding:4px 8px;border-radius:5px;font-weight:600">💬 '+msgs+'</div>':''}
      </div>
    </div>`;
  }).join('');
}

function filterClients(term){
  renderClientsList(term);
}

function goToAdminStat(type){
  S.adminStatFilter=type;
  
  // تخزين معلومات الكرت للاستخدام في الصفحات التفصيلية
  const cardThemes={
    'clients':{bg:'rgba(10,34,24,0.08)',border:'#0A2218',text:'#0A2218',accent:'#FFD700'},
    'invoices':{bg:'rgba(77,168,118,0.08)',border:'#4da876',text:'#4da876',accent:'#FFD700'},
    'overdue':{bg:'rgba(217,83,79,0.08)',border:'#d9534f',text:'#d9534f',accent:'#FFE66D'},
    'messages':{bg:'rgba(77,168,118,0.08)',border:'#7dbfa3',text:'#7dbfa3',accent:'#FFD700'},
    'documents':{bg:'rgba(255,183,0,0.08)',border:'#FF9500',text:'#FF9500',accent:'#0A2218'},
    'hours':{bg:'rgba(200,144,16,0.08)',border:'#FFC700',text:'#FFC700',accent:'#0A2218'},
    'contracts':{bg:'rgba(77,168,118,0.08)',border:'#4da876',text:'#4da876',accent:'#C89010'},
    'agreements':{bg:'rgba(200,144,16,0.08)',border:'#C89010',text:'#C89010',accent:'#2d1810'}
  };
  
  S.cardTheme=cardThemes[type]||{bg:'rgba(10,34,24,0.08)',border:'#0A2218',text:'#0A2218',accent:'#FFD700'};
  
  switch(type){
    case 'clients':
      S.tab='clients';
      break;
    case 'invoices':
      S.tab='reports';
      S.reportType='invoices';
      break;
    case 'overdue':
      S.tab='reports';
      S.reportType='overdue';
      break;
    case 'messages':
      // If a client is selected, automatically select it for messages
      if(S.currentClient && isAdmin()){
        S.selectedMsgClient=S.currentClient;
      }
      S.tab='messages';
      break;
    case 'documents':
      S.tab='documents';
      break;
    case 'hours':
      S.tab='reports';
      S.reportType='hours';
      break;
    case 'contracts':
      rAdminContracts(document.getElementById('content'));
      return;
  }
  renderApp();
}

function rDebtors(el,cid){
  cid=cid||S.currentClient;
  const c=S.clients.find(c=>c.id===cid);
  const today=new Date();
  const open=S.invoices.filter(i=>i.cid===cid&&['Openstaand','Verzonden','Verlopen'].includes(i.status));
  const aged=open.map(i=>{
    const days=Math.floor((today-new Date(i.due))/864e5);
    let bucket='Not due yet';
    if(days>90)bucket='90+ days';else if(days>60)bucket='61–90 days';else if(days>30)bucket='31–60 days';else if(days>0)bucket='0–30 days';
    return {...i,daysOverdue:days,bucket};
  }).sort((a,b)=>b.daysOverdue-a.daysOverdue);
  const buckets=['90+ days','61–90 days','31–60 days','0–30 days','Not due yet'];
  const totalsByBucket=buckets.map(b=>({b,total:aged.filter(a=>a.bucket===b).reduce((s,a)=>s+a.total,0),count:aged.filter(a=>a.bucket===b).length}));
  const totalOpen=aged.reduce((s,a)=>s+a.total,0);
  const totalOverdue=aged.filter(a=>a.daysOverdue>0).reduce((s,a)=>s+a.total,0);

  el.innerHTML=`
  <div class="kgrid">
    <div class="kcard"><div class="kl">${t('deb_open_invoices')}</div><div class="kv">${aged.length}</div></div>
    <div class="kcard"><div class="kl">${t('deb_total_outstanding')}</div><div class="kv" style="color:var(--orange)">${FMT(totalOpen)}</div></div>
    <div class="kcard"><div class="kl">${t('deb_overdue')}</div><div class="kv" style="color:var(--red)">${FMT(totalOverdue)}</div></div>
  </div>
  <div class="card">
    <div class="ch"><span class="ct">${t('deb_aging_summary')}</span></div>
    <table><thead><tr><th>${t('deb_period')}</th><th>${t('deb_invoices')}</th><th>${t('deb_amount')}</th></tr></thead>
    <tbody>${totalsByBucket.filter(bk=>bk.count>0).map(bk=>`<tr>
      <td style="font-weight:${t.b==='Not due yet'?400:600};color:${t.b==='90+ days'?'var(--red)':t.b==='Not due yet'?'var(--t3)':'var(--t1)'}">${t.b}</td>
      <td>${t.count}</td><td style="font-weight:600">${FMT(t.total)}</td>
    </tr>`).join('')||'<tr><td colspan="3" style="color:var(--t3)">No open invoices</td></tr>'}</tbody></table>
  </div>
  <div class="card">
    <div class="ch"><span class="ct">${isAdmin()?c?.name+' — ':''}${t('deb_open_invoices')}</span></div>

function rBTW(el,cid){
  cid=cid||S.currentClient;
  const c=S.clients.find(c=>c.id===cid);
  const now=new Date();
  const curQ=Math.floor(now.getMonth()/3)+1;
  const curYr=now.getFullYear();

  // Build list of available quarters (last 8 quarters)
  const quarters=[];
  for(let i=0;i<8;i++){
    let q=curQ-i; let yr=curYr;
    while(q<1){q+=4;yr--;}
    quarters.push({q,yr});
  }

  // Selected quarter (from state or default to current)
  const selQ=S.btwQ||curQ;
  const selYr=S.btwYr||curYr;

  // Calculate for selected quarter
  const qs=new Date(selYr,(selQ-1)*3,1);
  const qe=new Date(selYr,selQ*3,0);
  const inQ=d=>{const dt=new Date(d);return dt>=qs&&dt<=qe;};

  const pInv=S.invoices.filter(i=>i.cid===cid&&i.status==='Betaald'&&inQ(i.date));
  const allInv=S.invoices.filter(i=>i.cid===cid&&inQ(i.date));
  const exp=S.expenses.filter(e=>e.cid===cid&&inQ(e.date));

  // Rubriek 1a — leveringen/diensten belast met 21%
  const omz21=pInv.filter(i=>!i.btwRate||i.btwRate===21).reduce((s,i)=>s+(i.amount||0),0);
  const btw21=pInv.filter(i=>!i.btwRate||i.btwRate===21).reduce((s,i)=>s+(i.btw||0),0);
  // Rubriek 1b — leveringen/diensten belast met 9%
  const omz9=pInv.filter(i=>i.btwRate===9).reduce((s,i)=>s+(i.amount||0),0);
  const btw9=pInv.filter(i=>i.btwRate===9).reduce((s,i)=>s+(i.btw||0),0);
  // Rubriek 1c — 0% / vrijgesteld
  const omz0=allInv.filter(i=>i.btwRate===0).reduce((s,i)=>s+(i.amount||0),0);
  // Rubriek 4a — inkopen/kosten met BTW
  const bIn=exp.reduce((s,e)=>s+(e.btw||0),0);
  const expExcl=exp.reduce((s,e)=>s+(e.amount||0),0);
  // Rubriek 5b — subtotaal te betalen
  const btwOut=btw21+btw9;
  const due=btwOut-bIn;

  const dl={1:'30 april',2:'31 juli',3:'31 oktober',4:'31 januari'};
  const dlYr=selQ===4?selYr+1:selYr;
  const isPast=new Date(selYr,selQ*3,1)<now;
  const quarterOpts=quarters.map(({q,yr})=>`<option value="${q}_${yr}" ${q===selQ&&yr===selYr?'selected':''}>Q${q} ${yr}</option>`).join('');

  el.innerHTML=`

    <div class="kcard"><div class="kl">Netto te betalen</div><div class="kv" style="color:${due>0?'var(--red)':'var(--green)'}">${FMT(due)}</div></div>
  </div>

  <div style="display:flex;align-items:center;gap:10px;margin-bottom:12px;flex-wrap:wrap">
    <label style="font-size:12px;font-weight:600;color:var(--t3)">Kwartaal:</label>
    <select onchange="S.btwQ=parseInt(this.value.split('_')[0]);S.btwYr=parseInt(this.value.split('_')[1]);renderContent()"
      style="padding:5px 10px;border:1px solid var(--gr2);border-radius:var(--rs);font-size:12px">${quarterOpts}</select>
    <button class="btn btn-p btn-xs" onclick="exportBTWpdf('${cid}','${selQ}','${selYr}')">📄 Exporteer Aangifte PDF</button>
    <button class="btn btn-xs" onclick="exportBTWcsv('${cid}','${selQ}','${selYr}')">⬇ CSV voor Belastingdienst</button>
  </div>

  <div style="font-size:11px;font-weight:600;color:var(--t3);text-transform:uppercase;letter-spacing:.6px;margin-bottom:10px">
    BTW-aangifte Q${selQ} ${selYr} — ${c?.name}
    ${isPast?'<span class="bdg b-paid" style="margin-left:6px;text-transform:none">Kwartaal afgesloten</span>':'<span class="bdg b-open" style="margin-left:6px;text-transform:none">Lopend kwartaal</span>'}
  </div>

  <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px">
    <div class="card" style="margin-bottom:0">
      <div style="padding:10px 14px;font-size:11px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.5px;border-bottom:1px solid var(--gr2)">
        Omzetbelasting — Rubriek 1 (Te betalen)
      </div>
      <div class="btw-box">
        <div class="btr hdr"><span>Rubriek</span><span>Omzet excl.</span><span>BTW</span></div>
        <div class="btr"><span style="color:var(--t3)">1a — 21% leveringen/diensten</span><span>${FMT(omz21)}</span><span style="color:var(--orange)">${FMT(btw21)}</span></div>
        <div class="btr"><span style="color:var(--t3)">1b — 9% leveringen/diensten</span><span>${FMT(omz9)}</span><span style="color:var(--orange)">${FMT(btw9)}</span></div>
        <div class="btr"><span style="color:var(--t3)">1c — 0% / vrijgesteld</span><span>${FMT(omz0)}</span><span style="color:var(--t3)">—</span></div>
        <div class="btr total"><span><strong>Subtotaal (1)</strong></span><span></span><span style="color:var(--orange)"><strong>${FMT(btwOut)}</strong></span></div>

    <div class="card" style="margin-bottom:0">

        Voorbelasting — Rubriek 4/5 (Te vorderen)
      </div>
      <div class="btw-box">
        <div class="btr hdr"><span>Rubriek</span><span>Kosten excl.</span><span>BTW</span></div>
        <div class="btr"><span style="color:var(--t3)">4a — Inkopen / kosten NL</span><span>${FMT(expExcl)}</span><span style="color:var(--green)">${FMT(bIn)}</span></div>
        <div class="btr total"><span><strong>Subtotaal (4)</strong></span><span></span><span style="color:var(--green)"><strong>${FMT(bIn)}</strong></span></div>
        <div class="btr" style="border-top:2px solid var(--gr2);padding-top:8px">
          <span><strong>5b — Te betalen / te vorderen</strong></span>
          <span></span>
          <span style="font-weight:700;font-size:14px;color:${due>0?'var(--red)':'var(--green)'}">

      <div>1. Ga naar <strong>mijn.belastingdienst.nl</strong> → Inloggen met DigiD of eHerkenning</div>
      <div>2. Kies <strong>Ondernemen → Omzetbelasting → Doen aangifte Q${selQ} ${selYr}</strong></div>

function exportBTWcsv(cid,q,yr){
  q=parseInt(q);yr=parseInt(yr);
  const c=S.clients.find(c=>c.id===cid);
  const qs=new Date(yr,(q-1)*3,1),qe=new Date(yr,q*3,0);
  const inQ=d=>{const dt=new Date(d);return dt>=qs&&dt<=qe;};
  const pInv=S.invoices.filter(i=>i.cid===cid&&i.status==='Betaald'&&inQ(i.date));
  const exp=S.expenses.filter(e=>e.cid===cid&&inQ(e.date));
  const omz21=pInv.filter(i=>!i.btwRate||i.btwRate===21).reduce((s,i)=>s+(i.amount||0),0);
  const btw21=pInv.filter(i=>!i.btwRate||i.btwRate===21).reduce((s,i)=>s+(i.btw||0),0);
  const omz9=pInv.filter(i=>i.btwRate===9).reduce((s,i)=>s+(i.amount||0),0);
  const btw9=pInv.filter(i=>i.btwRate===9).reduce((s,i)=>s+(i.btw||0),0);
  const bIn=exp.reduce((s,e)=>s+(e.btw||0),0);
  const expExcl=exp.reduce((s,e)=>s+(e.amount||0),0);
  const due=(btw21+btw9)-bIn;

  const rows=[
    ['BTW-aangifte',`Q${q} ${yr}`,'',c?.name||''],
    ['Rubriek','Omschrijving','Omzet/Kosten excl. BTW','BTW-bedrag'],
    ['1a','Leveringen/diensten 21%',omz21.toFixed(2),btw21.toFixed(2)],
    ['1b','Leveringen/diensten 9%',omz9.toFixed(2),btw9.toFixed(2)],
    ['4a','Inkopen/kosten Nederland',expExcl.toFixed(2),bIn.toFixed(2)],
    ['5b','Te betalen / te vorderen','',due.toFixed(2)],
  ];
  const csv=rows.map(r=>r.map(v=>`"${v}"`).join(';')).join('\n');
  const a=document.createElement('a');
  a.href='data:text/csv;charset=utf-8,\uFEFF'+encodeURIComponent(csv);
  a.download=`BTW_aangifte_Q${q}_${yr}_${(c?.name||'').replace(/\s+/g,'_')}.csv`;
  a.click();
  toast(`✓ BTW Q${q} ${yr} CSV geëxporteerd`,'ti-check');
}

function humanSize(bytes){
  if(bytes<1024)return bytes+' B';
  if(bytes<1024*1024)return Math.round(bytes/1024)+' KB';
  return (bytes/1024/1024).toFixed(1)+' MB';
}

function compressImage(file){
  return new Promise((resolve,reject)=>{
    const img=new Image();
    const reader=new FileReader();
    reader.onload=()=>{
      img.onload=()=>{
        const MAX=1280;
        let w=img.width,h=img.height;
        if(w>MAX||h>MAX){
          if(w>h){h=Math.round(h*(MAX/w));w=MAX;}else{w=Math.round(w*(MAX/h));h=MAX;}
        }
        const canvas=document.createElement('canvas');
        canvas.width=w;canvas.height=h;
        canvas.getContext('2d').drawImage(img,0,0,w,h);
        const dataUrl=canvas.toDataURL('image/jpeg',0.65);
        resolve(dataUrl);
      };
      img.onerror=reject;
      img.src=reader.result;
    };
    reader.onerror=reject;
    reader.readAsDataURL(file);
  });
}

function readAsDataURL(file){
  return new Promise((resolve,reject)=>{
    const reader=new FileReader();
    reader.onload=()=>resolve(reader.result);
    reader.onerror=reject;
    reader.readAsDataURL(file);
  });
}

async function handleDocUpload(ev,cid){
  const files=Array.from(ev.target.files||[]);
  if(!files.length)return;
  for(const file of files){
    if(file.size>10*1024*1024){toast(`${file.name} is over 10MB — skipped`,'ti-alert-circle');continue;}
    try{
      let dataUrl,sizeBytes;
      if(file.type.startsWith('image/')){
        dataUrl=await compressImage(file);
        sizeBytes=Math.round(dataUrl.length*0.75); // approx decoded size from base64 length
      }else{
        dataUrl=await readAsDataURL(file);
        sizeBytes=file.size;
      }
      S.docs.push({id:UID(),cid,name:file.name,type:file.type||'application/octet-stream',
        date:TODAY(),from:isAdmin()?'anb':'client',size:humanSize(sizeBytes),data:dataUrl});
    }catch(err){
      toast(`Could not read ${file.name}`,'ti-alert-circle');
    }
  }
  sv();renderContent();
  toast(files.length>1?`✓ ${files.length} documents added`:'✓ Document added','ti-check');
  ev.target.value='';
}

function viewDoc(id){
  const d=S.docs.find(d=>d.id===id);
  if(!d||!d.data){toast('File data not available','ti-alert-circle');return;}
  if(d.type&&d.type.startsWith('image')){
    showModal(d.name,`<div style="text-align:center"><img src="${d.data}" style="max-width:100%;border-radius:8px"/></div>`,
      ()=>{const a=document.createElement('a');a.href=d.data;a.download=d.name;a.click();closeModal();},'Download');
  }else{
    const a=document.createElement('a');
    a.href=d.data;a.download=d.name;a.click();
  }
}

  const txt=inp?.value?.trim();
  if(!txt){inp?.focus();return;}
  
  const now=new Date();
  S.messages.push({
    id:UID(),
    cid,
    from:'anb',
    text:txt,
    date:TODAY(),
    time:now.getHours().toString().padStart(2,'0')+':'+now.getMinutes().toString().padStart(2,'0'),
    isRead:true,
    deleted:false
  });
  sv();
  inp.value='';
  rMessages(document.getElementById('content'),cid);

function sendMsgClient(cid){
  const inp=document.getElementById('msg-input-client');
  const txt=inp?.value?.trim();
  if(!txt){inp?.focus();return;}
  
  const now=new Date();
  S.messages.push({
    id:UID(),
    cid,
    from:'client',
    text:txt,
    date:TODAY(),
    time:now.getHours().toString().padStart(2,'0')+':'+now.getMinutes().toString().padStart(2,'0'),
    isRead:false,
    deleted:false
  });
  sv();
  inp.value='';
  rMessages(document.getElementById('content'),cid);
}

function rMessagesClient(el,cid){
  rMessages(el,cid);
}

}

function openContactModal(id, forceType){
  const cid=S.currentClient;
  const cont=S.contacts.find(c=>c.id===id&&c.cid===cid); // Filter by cid too
  const isNew=!cont;
  const lockedType=forceType||cont?.type||'debtor';
  
  // Only show type dropdown for edits (not for new) if no forceType
  const showTypeDropdown=!isNew && !forceType;
  
  showModal(isNew?'Add Contact':'Edit Contact',`
    <div class="fg"><label>Name *</label><input id="cm-name" value="${cont?.name||''}"/></div>
    ${showTypeDropdown?`
    <div class="fg"><label>Type *</label><select id="cm-type" onchange="updateAccNum()">
      <option value="debtor" ${lockedType==='debtor'?'selected':''}>Debtor (Customer)</option>
      <option value="creditor" ${lockedType==='creditor'?'selected':''}>Creditor (Supplier)</option>
    </select></div>
    `:`<div style="display:none" id="cm-type-locked">${lockedType}</div>`}
    <div class="fg"><label>Account # (Auto)</label><input id="cm-acc" value="${cont?.accountNumber||''}" disabled style="background:var(--bg2)"/></div>
    <div class="fr2">
      <div class="fg"><label>Email</label><input id="cm-email" value="${cont?.email||''}"/></div>
      <div class="fg"><label>Phone</label><input id="cm-phone" value="${cont?.phone||''}"/></div>
    </div>
    <div class="fg"><label>Address</label><input id="cm-addr" value="${cont?.address||''}"/></div>
    <div class="fr2">
      <div class="fg"><label>KvK</label><input id="cm-kvk" value="${cont?.kvk||''}"/></div>
      <div class="fg"><label>BTW</label><input id="cm-btw" value="${cont?.btw||''}"/></div>
    </div>
  `,()=>{
    const selectedType=showTypeDropdown?document.getElementById('cm-type').value:lockedType;
    const existingType=cont?.type;
    
    // If type changed, recalculate account number
    let accNum=cont?.accountNumber;
    if(isNew||selectedType!==existingType){
      const contactsOfType=S.contacts.filter(c=>c.type===selectedType&&c.cid===cid);
      const baseNum=selectedType==='debtor'?4100:3100;
      accNum=baseNum+contactsOfType.length;
    }
    
    const nc={
      id:cont?.id||UID(),
      cid, // ← Add cid to link contact to client
      name:document.getElementById('cm-name').value,
      type:selectedType,
      accountNumber:accNum.toString(),
      email:document.getElementById('cm-email').value,
      phone:document.getElementById('cm-phone').value,
      address:document.getElementById('cm-addr').value,
      kvk:document.getElementById('cm-kvk').value,
      btw:document.getElementById('cm-btw').value,
      createdAt:cont?.createdAt||TODAY(),
      isActive:true
    };
    if(!nc.name){alert('Name required');return;}
    if(isNew)S.contacts.push(nc);else S.contacts=S.contacts.map(c=>c.id===nc.id?nc:c);
    sv();closeModal();renderContent();toast('Contact saved ✓','ti-check');
  });
  
  // Calculate and update initial account number with the locked type
  updateAccNum(lockedType);
}

function updateAccNum(typeOverride){
  const typeDropdown=document.getElementById('cm-type');
  const type=typeOverride || typeDropdown?.value || 'debtor';
  const cid=S.currentClient;
  const contacts=S.contacts.filter(c=>c.type===type&&c.cid===cid); // Filter by type AND cid
  const baseNum=type==='debtor'?4100:3100;
  const nextNum=baseNum+contacts.length;
  const accField=document.getElementById('cm-acc');
  if(accField)accField.value=nextNum;
}

function delContact(id){
  if(!confirm('Delete this contact? (Ledger entries will not be deleted)'))return;
  const cid=S.currentClient;
  S.contacts=S.contacts.filter(c=>!(c.id===id&&c.cid===cid)); // Delete only this client's contact
  sv();renderContent();toast('Contact deleted ✓','ti-check');
}

/* ═══ ACTIONS ═══ */
function saveAdminAuth(){
  const newPw1=document.getElementById('s-ap')?.value;
  const newPw2=document.getElementById('s-ap2')?.value;
  const email=document.getElementById('s-aem')?.value;
  const phone=document.getElementById('s-aph')?.value;
  if(newPw1&&newPw1.length<6){toast('Password must be at least 6 characters','⚠');return;}
  if(newPw1&&newPw1!==newPw2){toast('Passwords do not match','⚠');return;}
  if(email)S.settings.email=email;
  if(phone)S.settings.phone=phone;
  if(newPw1){S.settings.adminPwCustom=newPw1;S.settings.adminPwSet=true;}
  sv();toast(t('btn_save_creds')+' ✓');renderContent();
}

function resetClientPw(cid){
  if(!confirm('Reset this client\'s password? They will need to set a new one on next login.'))return;
  const idx=S.clients.findIndex(c=>c.id===cid);
  if(idx>=0){delete S.clients[idx].pwCustom;delete S.clients[idx].pwSet;}
  sv();toast('Password reset — client must set new password','✓');renderContent();
}

function saveSettings(){
  S.settings.companyName=document.getElementById('s-cn')?.value||S.settings.companyName;
  S.settings.tagline=document.getElementById('s-tl')?.value||S.settings.tagline;
  S.settings.address=document.getElementById('s-ad')?.value||S.settings.address;
  S.settings.email=document.getElementById('s-em')?.value||S.settings.email;
  S.settings.phone=document.getElementById('s-ph')?.value||S.settings.phone;
  S.settings.kvk=document.getElementById('s-kv')?.value||'';
  S.settings.btw=document.getElementById('s-bt')?.value||'';
  S.settings.iban=document.getElementById('s-ib')?.value||'';
  S.settings.adminPw=document.getElementById('s-ap')?.value||S.settings.adminPw;
  sv();toast(t('settings_nav')+' ✓','ti-check');
}

}
function hasNewActivity(cid){
  // Check if there are new documents for this client without isViewed flag
  const newDocs=S.docs.filter(d=>d.cid===cid&&d.isNew);
  // Check if there are recent unreviewed expenses
  const now=new Date();
  const today=now.getFullYear()+'-'+String(now.getMonth()+1).padStart(2,'0')+'-'+String(now.getDate()).padStart(2,'0');
  const todayExp=S.expenses.filter(e=>e.cid===cid&&e.date===today&&!e.isReviewed);
  return newDocs.length>0||todayExp.length>0;
}

function fmtT(s){return[Math.floor(s/3600),Math.floor((s%3600)/60),s%60].map(v=>String(v).padStart(2,'0')).join(':');}
function timerToggle(){
  const tmr=S.timer;
  if(!tmr.running){
    tmr.task=document.getElementById('t-task')?.value||'Work';
    tmr.cat=document.getElementById('t-cat')?.value||'';
    tmr.running=true;tmr._start=Date.now()-tmr.seconds*1000;
    tmr._iv=setInterval(()=>{tmr.seconds=Math.floor((Date.now()-tmr._start)/1000);
      const d=document.getElementById('timer-disp');if(d)d.textContent=fmtT(tmr.seconds);},1000);
  } else {tmr.running=false;clearInterval(tmr._iv);}
  renderContent();
}

/* ═══ AUTOMATION: OVERDUE CHECK / RECURRING / EMAIL ═══ */
function checkOverdueInvoices(){
  const today=TODAY();
  let changed=0;
  (S.invoices||[]).forEach(i=>{
    if((i.status==='Openstaand'||i.status==='Verzonden')&&i.due&&i.due<today){
      i.status='Verlopen';changed++;
    }
  });
  if(changed>0)sv();
  return changed;
}

function generateRecurringInvoices(){
  if(!S.recurring||!S.recurring.length)return;
  const today=TODAY();
  let created=0;
  S.recurring.forEach(rec=>{
    if(!rec.active)return;
    let guard=0;
    while(rec.nextDate<=today&&guard<24){ // guard avoids any infinite loop on bad data
      const due=addInterval(rec.nextDate,'monthly'); // standard 30-day payment term regardless of recurrence frequency
      const btw=rec.amount*(rec.btwRate/100);
      S.invoices.push({id:UID(),cid:rec.cid,num:nextNum(rec.cid),desc:rec.desc+' ('+FD(rec.nextDate)+')',
        date:rec.nextDate,due,status:'Openstaand',amount:rec.amount,btw,
        total:rec.amount+btw,btwRate:rec.btwRate,fromRecurring:rec.id});
      created++;
      rec.nextDate=addInterval(rec.nextDate,rec.frequency);
      guard++;
    }
  });
  if(created>0)sv();
  return created;
}

function toggleRecurring(id){
  const rec=(S.recurring||[]).find(r=>r.id===id);

function exportBackup(){
  const keys=['clients','invoices','expenses','hours','docs','messages','settings','journal','bankTx','recurring','yearClosings'];
  const payload={app:'ANB_FinAdmin_Pro',version:1,exportedAt:new Date().toISOString(),data:{}};
  keys.forEach(k=>{payload.data[k]=S[k]!==undefined?S[k]:(Array.isArray(S[k])?[]:null);});
  const json=JSON.stringify(payload,null,2);
  const blob=new Blob([json],{type:'application/json'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;a.download=`ANB_Backup_${TODAY()}.json`;a.click();
  setTimeout(()=>URL.revokeObjectURL(url),2000);
  S.settings.lastBackup=TODAY();sv();
  toast(t('btn_download_backup')+' ✓');
  if(S.tab==='settings')renderContent();
}

function importBackup(ev){
  const file=ev.target.files&&ev.target.files[0];
  if(!file)return;
  const reader=new FileReader();
  reader.onload=function(e){
    try{
      const parsed=JSON.parse(e.target.result);
      const data=parsed&&parsed.data?parsed.data:parsed; // tolerate raw S-shaped JSON too
      if(!data||typeof data!=='object'){toast('Invalid backup file','ti-alert-circle');return;}
      const keys=['clients','invoices','expenses','hours','docs','messages','settings','journal','bankTx','recurring','yearClosings'];
      const found=keys.filter(k=>data[k]!==undefined);
      if(!found.length){toast('This file does not look like an ANB backup','ti-alert-circle');return;}
      if(!confirm(`Restore backup? This will replace all current data (${found.length} sections found). This cannot be undone.`))return;
      keys.forEach(k=>{if(data[k]!==undefined)S[k]=data[k];});
      sv();
      S.currentClient=null;S.tab=isAdmin()?'dashboard':'dashboard';
      toast('✓ '+t('btn_restore'));
      renderApp();
    }catch(err){
      toast('Could not read backup file','ti-alert-circle');
    }
    ev.target.value='';
  };
  reader.readAsText(file);
}

/* ═══ YEAR-END CLOSING ═══ */
function isYearClosed(cid,year){
  return (S.yearClosings||[]).some(yc=>yc.cid===cid&&yc.year===year);
}
function openYearEndClosing(){
  const cid=document.getElementById('ye-client').value;
  const year=parseInt(document.getElementById('ye-year').value);
  const c=S.clients.find(x=>x.id===cid);
  if(!c){toast('Select a client first','ti-alert-circle');return;}
  if(isYearClosed(cid,year)){toast(`FY${year} is already closed for ${c.name}`,'ti-alert-circle');return;}

  const yInv=S.invoices.filter(i=>i.cid===cid&&i.status!=='Concept'&&i.date&&i.date.slice(0,4)===String(year));
  const yExp=S.expenses.filter(e=>e.cid===cid&&e.date&&e.date.slice(0,4)===String(year));
  const revenue=yInv.reduce((s,i)=>s+(i.amount||0),0);
  const costs=yExp.reduce((s,e)=>s+(e.amount||0),0);
  const netResult=revenue-costs;

  showModal(`Close FY${year} — ${c.name}`,`
    <div style="font-size:12px;color:var(--t3);margin-bottom:14px;line-height:1.6">
      This will lock journal postings for FY${year} on this client and book the net result to
      <strong>0500 Eigen vermogen</strong>. This action cannot be undone.
    </div>
    <table style="margin-bottom:8px">
      <tbody>
        <tr><td>Revenue (${yInv.length} invoices)</td><td style="text-align:right;font-weight:600">${FMT(revenue)}</td></tr>
        <tr><td>Costs (${yExp.length} expenses)</td><td style="text-align:right;font-weight:600;color:var(--red)">${FMT(-costs)}</td></tr>
        <tr style="border-top:1px solid var(--gr2)"><td style="font-weight:700">Net result FY${year}</td>
          <td style="text-align:right;font-weight:700;color:${netResult>=0?'var(--green)':'var(--red)'}">${FMT(netResult)}</td></tr>
      </tbody>
    </table>
  `,()=>{
    if(!S.journal)S.journal=[];
    S.journal.push({id:UID(),cid,date:`${year}-12-31`,
      desc:`Year-end closing FY${year} — net result to equity`,
      db:netResult>=0?'1000':'0500',cr:netResult>=0?'0500':'2900',
      amount:Math.abs(netResult),btw:0,type:'closing',locked:true});
    if(!S.yearClosings)S.yearClosings=[];
    S.yearClosings.push({id:UID(),cid,year,closedOn:TODAY(),netResult});
    sv();closeModal();renderContent();
    toast(`✓ FY${year} closed for ${c.name}`);
  },'Close year');
}

      <div class="fg"><label>${t('lbl_btw')}</label><select id="if-r" onchange="uIT()"><option value="21" ${inv?.btwRate===21?'selected':''}>21%</option><option value="9" ${inv?.btwRate===9?'selected':''}>9%</option><option value="0" ${inv?.btwRate===0?'selected':''}>0% KOR</option></select></div>
    </div>
    <div class="itot">
      <div class="itr"><span>BTW</span><span id="it-b">€0.00</span></div>

      <label style="display:flex;align-items:center;gap:6px;cursor:pointer;text-transform:none;font-size:12px;color:var(--t1)">

      </label>
    </div>
    <div id="if-rec-freq-wrap" style="display:none">
      <div class="fg"><label>Repeats</label>
        <select id="if-rec-freq"><option value="monthly">Monthly</option><option value="quarterly">Every 3 months</option><option value="yearly">Yearly</option></select>
      </div>
    </div>`:''}
  `,()=>{
    const a=parseFloat(document.getElementById('if-a').value)||0;
    const r=parseFloat(document.getElementById('if-r').value);
    const btw=a*(r/100);
    const ni={id:inv?.id||UID(),cid,num:document.getElementById('if-n').value,
      desc:document.getElementById('if-desc').value,date:document.getElementById('if-d').value,
      due:document.getElementById('if-dd').value,status:document.getElementById('if-s').value,
      amount:a,btw,total:a+btw,btwRate:r,
      billTo:document.getElementById('if-billto')?.value||inv?.billTo||'',
      billToId:document.getElementById('if-billto-id')?.value||inv?.billToId||''};
    
    // Comprehensive validation for all required fields
    const errors=[];
    if(!ni.billToId)errors.push('📋 Select recipient (Bill To)');
    if(!ni.desc)errors.push('📝 Description is required');
    if(a<=0)errors.push('💶 Amount must be greater than 0');
    
    if(errors.length>0){
      alert('❌ Please complete all required fields:\n\n'+errors.join('\n'));
      return;
    }
    if(isN)S.invoices.push(ni);else S.invoices=S.invoices.map(i=>i.id===ni.id?ni:i);
    if(isN&&document.getElementById('if-rec')?.checked){
      const freq=document.getElementById('if-rec-freq').value;
      if(!S.recurring)S.recurring=[];
      S.recurring.push({id:UID(),cid,desc:ni.desc,amount:a,btwRate:r,frequency:freq,
        active:true,nextDate:addInterval(ni.date,freq),createdFrom:ni.id});
    }
    sv();closeModal();renderContent();toast(isN?t('tab_invoices')+' ✓':t('tab_invoices')+' ✓','ti-check');
  });
  setTimeout(uIT,50);
}
function upBillTo(){

function uIT(){

function openNewExpense(){

  }
  
  showModal(t('new_expense').replace('+ ',''),`
    <div style="display:flex;gap:8px;margin-bottom:16px">
      <button type="button" class="btn btn-xs" id="ex-manual-btn" style="flex:1;background:var(--g1);color:var(--gold3);border:none;cursor:pointer">✏️ Manual</button>

    </div>
    <div id="ex-manual-form" style="display:block">
      <div class="fr2">
        <div class="fg"><label>Date</label><input type="date" id="ex-d" value="${TODAY()}"/></div>
        <div class="fg"><label>Category</label><select id="ex-c">${['Software','Hardware','Kantoor','Marketing','Transport','Opleiding','Telecom','Overig'].map(c=>`<option>${c}</option>`).join('')}</select></div>
      </div>
      <div class="fg"><label>Supplier</label><input id="ex-s"/></div>
      <div class="fg"><label>Description</label><input id="ex-desc"/></div>
      <div class="fr2">
        <div class="fg"><label>Amount excl. BTW (€)</label><input type="number" id="ex-a" step="0.01"/></div>
        <div class="fg"><label>${t('lbl_btw')}</label><select id="ex-r"><option value="21">21%</option><option value="9">9%</option><option value="0">0%</option></select></div>
      </div>
    </div>
    <div id="ex-upload-msg" style="display:none;text-align:center;padding:20px;color:var(--t3)">
      📁 Choose a file (PDF or image) to upload<br/><span style="font-size:11px">File will be saved as expense document</span>
    </div>
    <div id="ex-camera-msg" style="display:none;text-align:center;padding:20px;color:var(--t3)">
      📸 Take a photo of your receipt<br/><span style="font-size:11px">Photo will be saved as expense document</span>
    </div>
  `,()=>{
    if(currentMode==='manual'){
      const a=parseFloat(document.getElementById('ex-a').value)||0;
      const r=parseFloat(document.getElementById('ex-r').value);
      if(!document.getElementById('ex-desc').value.trim()){alert('Description required');return;}
      S.expenses.push({id:UID(),cid,date:document.getElementById('ex-d').value,
        supplier:document.getElementById('ex-s').value,desc:document.getElementById('ex-desc').value,
        cat:document.getElementById('ex-c').value,amount:a,btw:a*(r/100)});
      sv();closeModal();renderContent();toast(t('tab_expenses')+' ✓','ti-check');
    }
  },'Save Expense');
  
  // Get modal elements
  const manualBtn=document.getElementById('ex-manual-btn');
  const uploadBtn=document.getElementById('ex-upload-btn');
  const cameraBtn=document.getElementById('ex-camera-btn');
  const manualForm=document.getElementById('ex-manual-form');
  const uploadMsg=document.getElementById('ex-upload-msg');
  const cameraMsg=document.getElementById('ex-camera-msg');
  const moSaveBtn=document.getElementById('mo-s');
  
  const switchMode=(mode)=>{
    currentMode=mode;
    if(manualBtn){manualBtn.style.background=mode==='manual'?'var(--g1)':'transparent';manualBtn.style.color=mode==='manual'?'var(--gold3)':'var(--t3)';}
    if(uploadBtn){uploadBtn.style.background=mode==='upload'?'var(--g1)':'transparent';uploadBtn.style.color=mode==='upload'?'var(--gold3)':'var(--t3)';}
    if(cameraBtn){cameraBtn.style.background=mode==='camera'?'var(--g1)':'transparent';cameraBtn.style.color=mode==='camera'?'var(--gold3)':'var(--t3)';}
    if(manualForm)manualForm.style.display=mode==='manual'?'block':'none';
    if(uploadMsg)uploadMsg.style.display=mode==='upload'?'block':'none';
    if(cameraMsg)cameraMsg.style.display=mode==='camera'?'block':'none';
    if(moSaveBtn)moSaveBtn.textContent=mode==='manual'?'Save Expense':'Cancel';
  };
  
  // Manual button
  if(manualBtn)manualBtn.addEventListener('click',(e)=>{
    e.preventDefault();
    switchMode('manual');
  });
  
  // Upload button - trigger global file input
  if(uploadBtn)uploadBtn.addEventListener('click',(e)=>{
    e.preventDefault();
    switchMode('upload');
    setTimeout(()=>{
      window._expenseFileInput.click();
    },100);
  });
  
  // Camera button - trigger global camera input
  if(cameraBtn)cameraBtn.addEventListener('click',(e)=>{
    e.preventDefault();
    switchMode('camera');
    setTimeout(()=>{
      window._expenseCameraInput.click();
    },100);
  });
  
  // File upload handler (remove old listeners first)
  window._expenseFileInput.onchange=null;
  window._expenseFileInput.addEventListener('change',(ev)=>{
    const file=ev.target.files?.[0];
    if(!file)return;
    
    (async()=>{
      try{
        let dataUrl,sizeBytes;
        if(file.type.startsWith('image/')){
          dataUrl=await compressImage(file);
          sizeBytes=Math.round(dataUrl.length*0.75);
        }else{
          dataUrl=await readAsDataURL(file);
          sizeBytes=file.size;
        }
        if(!S.docs)S.docs=[];
        S.docs.push({id:UID(),cid:S.currentClient,name:file.name,type:file.type||'application/octet-stream',
          date:TODAY(),from:isAdmin()?'anb':'client',size:humanSize(sizeBytes),data:dataUrl,isNew:true});
        sv();
        closeModal();
        renderContent();
        toast('✓ Document added');
        window._expenseFileInput.value='';
      }catch(err){
        toast('Error: '+err.message);
      }
    })();
  },false);
  
  // Camera handler (remove old listeners first)
  window._expenseCameraInput.onchange=null;
  window._expenseCameraInput.addEventListener('change',(ev)=>{
    const file=ev.target.files?.[0];
    if(!file)return;
    
    (async()=>{
      try{
        const dataUrl=await compressImage(file);
        const sizeBytes=Math.round(dataUrl.length*0.75);
        if(!S.docs)S.docs=[];
        S.docs.push({id:UID(),cid:S.currentClient,name:'Receipt_'+TODAY()+'_'+UID().slice(0,4)+'.jpg',type:'image/jpeg',
          date:TODAY(),from:isAdmin()?'anb':'client',size:humanSize(sizeBytes),data:dataUrl,isNew:true});
        sv();
        closeModal();
        renderContent();
        toast('✓ Receipt captured');
        window._expenseCameraInput.value='';
      }catch(err){
        toast('Error: '+err.message);
      }
    })();
  },false);
}
